<script>
// =====================
// === TEST HARNESS ===
// =====================
const results = [];
let currentSuite = '';

function suite(name) { currentSuite = name; }

function test(name, fn) {
  try {
    fn();
    results.push({ suite: currentSuite, name, pass: true });
  } catch (e) {
    results.push({ suite: currentSuite, name, pass: false, err: e.message });
  }
}

function assert(condition, msg) {
  if (!condition) throw new Error(msg || 'Assertion failed');
}

function assertEqual(a, b, msg) {
  if (a !== b) throw new Error(msg || `Expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`);
}

function assertArrayEqual(a, b, msg) {
  const sa = JSON.stringify(a), sb = JSON.stringify(b);
  if (sa !== sb) throw new Error(msg || `Expected ${sb}, got ${sa}`);
}

// =====================
// === INLINE COPIES OF PRODUCTION CODE UNDER TEST ===
// (Extracted from beat-maker.html so tests run without DOM dependencies)
// =====================

const INST_META = {
  kick:  { label: 'Kick',   short: 'KICK', color: '#FF6B35', emoji: '🔴', cssClass: 'kick'  },
  snare: { label: 'Snare',  short: 'SNAR', color: '#FFD166', emoji: '🟡', cssClass: 'snare' },
  hihat: { label: 'Hi-Hat', short: 'HIHT', color: '#06D6A0', emoji: '🟢', cssClass: 'hihat' },
  bass:  { label: 'Bass',   short: 'BASS', color: '#B06AE0', emoji: '🟣', cssClass: 'bass'  },
  keys:  { label: 'Keys',   short: 'KEYS', color: '#00E5FF', emoji: '🎹', cssClass: 'keys'  },
};
const NOTES   = ['C','D','E','F','G','A','B'];
const OCTAVES = ['low','mid','high'];
const OCTAVE_NUM = { low: 3, mid: 4, high: 5 };

const NOTE_FREQ = {
  'C3':130.81,'D3':146.83,'E3':164.81,'F3':174.61,'G3':196.00,'A3':220.00,'B3':246.94,
  'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,'G4':392.00,'A4':440.00,'B4':493.88,
  'C5':523.25,'D5':587.33,'E5':659.25,'F5':698.46,'G5':783.99,'A5':880.00,'B5':987.77,
};

function makeSlot(instrument = 'kick', note = 'C', octave = 'mid') {
  return { instrument, note, octave, pattern: new Array(16).fill(false) };
}

function getKeyFreq(note, octave) {
  return NOTE_FREQ[note + OCTAVE_NUM[octave]] || 440;
}

// Grading logic (pure, no DOM)
function computeGrade(slots) {
  const allActive = slots.flatMap(s => s.pattern).filter(Boolean);
  const totalPads = slots.length * 16;
  const filled = allActive.length;
  const density = filled / totalPads;

  const densityScore = density < 0.15 ? 10 : density < 0.3 ? 20 : density <= 0.55 ? 30 : density <= 0.75 ? 20 : 10;

  const activeTypes = new Set(slots.filter(s => s.pattern.some(Boolean)).map(s => s.instrument));
  const varietyScore = Math.min(25, activeTypes.size * 5);

  const offBeats = [2,4,6,10,12,14];
  let offCount = 0;
  slots.forEach(s => offBeats.forEach(step => { if (s.pattern[step]) offCount++; }));
  const syncoScore = Math.min(20, Math.floor((offCount / Math.max(1, slots.length * offBeats.length)) * 40));

  const kickSlots  = slots.filter(s => s.instrument === 'kick');
  const snareSlots = slots.filter(s => s.instrument === 'snare');
  let anchorScore = 0;
  if (kickSlots.some(s => s.pattern[0]))                    anchorScore += 8;
  if (snareSlots.some(s => s.pattern[4] || s.pattern[8]))   anchorScore += 7;

  const keysSlots = slots.filter(s => s.instrument === 'keys' && s.pattern.some(Boolean));
  const distinctPitches = new Set(keysSlots.map(s => `${s.note}${OCTAVE_NUM[s.octave]}`));
  let harmonicScore = 0;
  if (keysSlots.length >= 1)     harmonicScore += 8;
  if (distinctPitches.size >= 2) harmonicScore += 7;
  if (distinctPitches.size >= 3) harmonicScore += 5;

  const exploScore = slots.length >= 10 ? 10 : slots.length >= 7 ? 5 : 0;

  const total = densityScore + varietyScore + syncoScore + anchorScore + harmonicScore + exploScore;
  const grade = total >= 90 ? 'S' : total >= 75 ? 'A' : total >= 55 ? 'B' : total >= 35 ? 'C' : 'D';

  return { total, grade, densityScore, varietyScore, syncoScore, anchorScore, harmonicScore, exploScore };
}

// Slot management (pure, operating on a slots array passed in)
function addSlot_pure(slots) {
  if (slots.length >= 12) return slots;
  return [...slots, makeSlot('kick')];
}

function removeSlot_pure(slots, i) {
  if (slots.length <= 1) return slots;
  return slots.filter((_, idx) => idx !== i);
}

function setSlotInstrument_pure(slots, i, instrument) {
  const updated = slots.map((s, idx) => idx === i ? { ...s, instrument } : s);
  if (instrument === 'keys' && !updated[i].note) {
    updated[i] = { ...updated[i], note: 'C', octave: 'mid' };
  }
  return updated;
}

// Profanity filter (inline copy from beat-maker.html)
const _STANKY_WORDS = [
  'fuck','fucker','fucking','fucked',
  'shit','shitting','shitty',
  'bitch','bitches',
  'cunt','cunts',
  'cock','cocks',
  'dick','dicks',
  'pussy','pussies',
  'asshole','assholes','asshat',
  'nigger','niggers','nigga','niggas',
  'faggot','faggots','fag','fags',
  'whore','whores',
  'slut','sluts',
  'twat','twats',
  'dildo','dildos',
  'kike','kikes',
  'chink','chinks',
  'wetback','wetbacks',
  'retard','retards',
];
function _isStanky(str) {
  const norm = str.toLowerCase()
    .replace(/[@4]/g, 'a').replace(/3/g, 'e')
    .replace(/[!1]/g, 'i').replace(/0/g, 'o').replace(/[$5]/g, 's')
    .replace(/[^a-z]/g, '');
  return _STANKY_WORDS.some(w => norm.includes(w));
}

// Scoreboard module (inline copy using an isolated test key so tests don't touch real data)
const _testSB = (() => {
  const KEY = 'swankycheese_test_' + Math.random().toString(36).slice(2);
  const TOP_SIZE = 20;
  function _load() {
    try { return JSON.parse(localStorage.getItem(KEY)) || { top20: [], history: [] }; }
    catch { return { top20: [], history: [] }; }
  }
  function _save(d) { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch {} }
  function _cmp(a, b) {
    if (b.rawScore !== a.rawScore) return b.rawScore - a.rawScore;
    if (b.ptsAwarded !== a.ptsAwarded) return b.ptsAwarded - a.ptsAwarded;
    return a.timestamp - b.timestamp;
  }
  function tryAdd(rawScore, ptsAwarded) {
    const { top20 } = _load();
    if (top20.length < TOP_SIZE) {
      const h = { rawScore, ptsAwarded, timestamp: Date.now() };
      const rank = [...top20, h].sort(_cmp).findIndex(e => e === h) + 1;
      return { qualifies: true, rank };
    }
    const worst = [...top20].sort(_cmp)[TOP_SIZE - 1];
    if (rawScore < worst.rawScore) return { qualifies: false, rank: null };
    if (rawScore === worst.rawScore && ptsAwarded <= worst.ptsAwarded) return { qualifies: false, rank: null };
    const h = { rawScore, ptsAwarded, timestamp: Date.now() };
    const sorted = [...top20, h].sort(_cmp);
    const rank = sorted.findIndex(e => e === h) + 1;
    return { qualifies: rank <= TOP_SIZE, rank: rank <= TOP_SIZE ? rank : null };
  }
  function buildEntry(name, grade, rawScore, ptsAwarded, slots, bpm, beatCount) {
    return {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
      name: (name || '').trim() || 'Unnamed Beat',
      grade, rawScore, ptsAwarded, bpm, beatCount,
      slots: slots.map(s => ({ instrument: s.instrument, note: s.note, octave: s.octave, pattern: Array.from(s.pattern) })),
      timestamp: Date.now(),
      date: new Date().toLocaleDateString(),
    };
  }
  function addEntry(entry) {
    const data = _load();
    data.history.push({ ...entry });
    data.top20.push(entry);
    data.top20.sort(_cmp);
    if (data.top20.length > TOP_SIZE) data.top20.length = TOP_SIZE;
    _save(data);
    const rank = data.top20.findIndex(e => e.id === entry.id);
    return rank >= 0 ? rank + 1 : null;
  }
  function getTop20() { return _load().top20; }
  function historyCount() { return _load().history.length; }
  function clear() { localStorage.removeItem(KEY); }
  return { tryAdd, buildEntry, addEntry, getTop20, historyCount, clear };
})();

// --- makeSlot ---
suite('makeSlot()');

test('returns correct shape', () => {
  const s = makeSlot();
  assert('instrument' in s, 'missing instrument');
  assert('note' in s,       'missing note');
  assert('octave' in s,     'missing octave');
  assert('pattern' in s,    'missing pattern');
});

test('defaults to kick/C/mid', () => {
  const s = makeSlot();
  assertEqual(s.instrument, 'kick');
  assertEqual(s.note,       'C');
  assertEqual(s.octave,     'mid');
});

test('pattern is 16 falses', () => {
  const s = makeSlot();
  assertEqual(s.pattern.length, 16);
  assert(s.pattern.every(v => v === false), 'pattern not all false');
});

test('custom args are applied', () => {
  const s = makeSlot('snare', 'G', 'high');
  assertEqual(s.instrument, 'snare');
  assertEqual(s.note,       'G');
  assertEqual(s.octave,     'high');
});

// --- addSlot_pure / removeSlot_pure ---
suite('Slot management');

test('addSlot appends a kick slot', () => {
  const slots = [makeSlot('kick')];
  const next = addSlot_pure(slots);
  assertEqual(next.length, 2);
  assertEqual(next[1].instrument, 'kick');
});

test('addSlot enforces max 12', () => {
  let slots = Array.from({ length: 12 }, () => makeSlot());
  const next = addSlot_pure(slots);
  assertEqual(next.length, 12, 'should not exceed 12');
});

test('removeSlot removes correct index', () => {
  const slots = [makeSlot('kick'), makeSlot('snare'), makeSlot('hihat')];
  const next = removeSlot_pure(slots, 1);
  assertEqual(next.length, 2);
  assertEqual(next[0].instrument, 'kick');
  assertEqual(next[1].instrument, 'hihat');
});

test('removeSlot enforces min 1', () => {
  const slots = [makeSlot('kick')];
  const next = removeSlot_pure(slots, 0);
  assertEqual(next.length, 1, 'should not go below 1');
});

test('removeSlot preserves pattern data of surviving slots', () => {
  const s1 = makeSlot('kick');  s1.pattern[0] = true;
  const s2 = makeSlot('snare'); s2.pattern[4] = true;
  const s3 = makeSlot('hihat');
  const next = removeSlot_pure([s1, s2, s3], 2);
  assert(next[1].pattern[4], 'snare pattern[4] should survive');
});

test('setSlotInstrument preserves pattern', () => {
  const slots = [makeSlot('kick')];
  slots[0].pattern[3] = true;
  const next = setSlotInstrument_pure(slots, 0, 'snare');
  assertEqual(next[0].instrument, 'snare');
  assert(next[0].pattern[3], 'pattern should be preserved');
});

test('setSlotInstrument to keys sets default note/octave', () => {
  const slots = [makeSlot('kick')];
  slots[0].note = '';
  const next = setSlotInstrument_pure(slots, 0, 'keys');
  assertEqual(next[0].instrument, 'keys');
  assertEqual(next[0].note, 'C');
  assertEqual(next[0].octave, 'mid');
});

// --- getKeyFreq ---
suite('getKeyFreq()');

test('C3 = 130.81 Hz (low octave)', () => {
  assertEqual(getKeyFreq('C', 'low'), 130.81);
});

test('C4 = 261.63 Hz (mid octave)', () => {
  assertEqual(getKeyFreq('C', 'mid'), 261.63);
});

test('C5 = 523.25 Hz (high octave)', () => {
  assertEqual(getKeyFreq('C', 'high'), 523.25);
});

test('A4 = 440 Hz', () => {
  assertEqual(getKeyFreq('A', 'mid'), 440.00);
});

test('all 21 note/octave combos return a number > 0', () => {
  let missing = [];
  NOTES.forEach(n => OCTAVES.forEach(o => {
    const f = getKeyFreq(n, o);
    if (typeof f !== 'number' || f <= 0) missing.push(`${n}/${o}`);
  }));
  assert(missing.length === 0, `Missing freqs: ${missing.join(', ')}`);
});

test('fallback to 440 on unknown note', () => {
  assertEqual(getKeyFreq('X', 'mid'), 440);
});

// --- INST_META ---
suite('INST_META');

test('all 5 instruments defined', () => {
  const keys = Object.keys(INST_META);
  assertEqual(keys.length, 5);
  ['kick','snare','hihat','bass','keys'].forEach(k => {
    assert(k in INST_META, `missing: ${k}`);

test('each instrument has required fields', () => {
  Object.entries(INST_META).forEach(([id, meta]) => {
    assert(meta.label,    `${id} missing label`);
    assert(meta.short,    `${id} missing short`);
    assert(meta.color,    `${id} missing color`);
    assert(meta.emoji,    `${id} missing emoji`);
    assert(meta.cssClass, `${id} missing cssClass`);

});

// --- Grading: Density ---
suite('gradeBeat() — Density');

test('density < 0.15 → densityScore 10', () => {
  const slots = [makeSlot('kick')]; // 1 slot = 16 pads
  slots[0].pattern[0] = true; // 1/16 = 6.25%
  const { densityScore } = computeGrade(slots);
  assertEqual(densityScore, 10);
});

test('sweet spot 20–55% → densityScore 30', () => {
  const slots = [makeSlot('kick'), makeSlot('snare')]; // 32 pads
  // activate 10 pads = 31.25%
  for (let i = 0; i < 10; i++) slots[0].pattern[i] = true;
  const { densityScore } = computeGrade(slots);
  assertEqual(densityScore, 30);
});

test('density > 0.75 → densityScore 10', () => {
  const slots = [makeSlot('kick')];
  slots[0].pattern.fill(true); // 16/16 = 100%
  const { densityScore } = computeGrade(slots);
  assertEqual(densityScore, 10);
});

// --- Grading: Variety ---
suite('gradeBeat() — Variety');

test('1 instrument type → 5 pts', () => {
  const slots = [makeSlot('kick'), makeSlot('kick')];
  slots[0].pattern[0] = true;
  slots[1].pattern[0] = true;
  const { varietyScore } = computeGrade(slots);
  assertEqual(varietyScore, 5);
});

test('all 5 instrument types → 25 pts', () => {
  const slots = ['kick','snare','hihat','bass','keys'].map(i => {
    const s = makeSlot(i); s.pattern[0] = true; return s;
  });
  const { varietyScore } = computeGrade(slots);
  assertEqual(varietyScore, 25);
});

test('instrument in slot but no active pads → not counted', () => {
  const slots = [makeSlot('kick'), makeSlot('snare')];
  slots[0].pattern[0] = true;
  // snare has no active pads
  const { varietyScore } = computeGrade(slots);
  assertEqual(varietyScore, 5, 'empty snare should not count');
});

// --- Grading: Rhythm Anchor ---
suite('gradeBeat() — Rhythm Anchor');

test('kick step 0 + snare step 4 → 15 pts', () => {
  const slots = [makeSlot('kick'), makeSlot('snare')];
  slots[0].pattern[0] = true;
  slots[1].pattern[4] = true;
  const { anchorScore } = computeGrade(slots);
  assertEqual(anchorScore, 15);
});

test('kick step 0 + snare step 8 → 15 pts', () => {
  const slots = [makeSlot('kick'), makeSlot('snare')];
  slots[0].pattern[0] = true;
  slots[1].pattern[8] = true;
  const { anchorScore } = computeGrade(slots);
  assertEqual(anchorScore, 15);
});

test('kick not on step 0 → 0 kick pts', () => {
  const slots = [makeSlot('kick'), makeSlot('snare')];
  slots[0].pattern[4] = true; // kick on wrong step
  slots[1].pattern[4] = true;
  const { anchorScore } = computeGrade(slots);
  assertEqual(anchorScore, 7, 'only snare pts');

test('anchor found when kick is in any slot, not just first', () => {
  const slots = [makeSlot('snare'), makeSlot('kick')];
  slots[1].pattern[0] = true; // kick in slot 1
  slots[0].pattern[4] = true;
  const { anchorScore } = computeGrade(slots);

// --- Grading: Harmonic Depth ---
suite('gradeBeat() — Harmonic Depth');

test('0 keys slots → 0 harmonic pts', () => {
  const slots = [makeSlot('kick')];
  slots[0].pattern[0] = true;
  const { harmonicScore } = computeGrade(slots);
  assertEqual(harmonicScore, 0);
});

test('1 keys slot active → 8 pts', () => {
  const slots = [makeSlot('keys', 'C', 'mid')];
  slots[0].pattern[0] = true;
  const { harmonicScore } = computeGrade(slots);
  assertEqual(harmonicScore, 8);
});

test('2 distinct keys pitches → 15 pts', () => {
  const s1 = makeSlot('keys', 'C', 'mid'); s1.pattern[0] = true;
  const s2 = makeSlot('keys', 'G', 'mid'); s2.pattern[0] = true;
  const { harmonicScore } = computeGrade([s1, s2]);
  assertEqual(harmonicScore, 15);
});

test('3 distinct keys pitches → 20 pts', () => {
  const s1 = makeSlot('keys', 'C', 'mid'); s1.pattern[0] = true;
  const s2 = makeSlot('keys', 'G', 'mid'); s2.pattern[0] = true;
  const s3 = makeSlot('keys', 'E', 'high'); s3.pattern[0] = true;
  const { harmonicScore } = computeGrade([s1, s2, s3]);
  assertEqual(harmonicScore, 20);
});

test('same pitch in two slots counts as 1 distinct pitch', () => {
  const s1 = makeSlot('keys', 'C', 'mid'); s1.pattern[0] = true;
  const s2 = makeSlot('keys', 'C', 'mid'); s2.pattern[0] = true;
  const { harmonicScore } = computeGrade([s1, s2]);
  assertEqual(harmonicScore, 8, 'duplicate pitch should not boost score');
});

test('keys slot with no active pads not counted', () => {
  const s1 = makeSlot('keys', 'C', 'mid'); // empty pattern
  const s2 = makeSlot('kick'); s2.pattern[0] = true;
  const { harmonicScore } = computeGrade([s1, s2]);
  assertEqual(harmonicScore, 0, 'inactive keys should not count');
});

test('12 slots → 10 pts', () => {

// --- Grade thresholds ---
suite('gradeBeat() — Grade thresholds');

test('total ≥ 90 → S', () => {
  // Max score setup: kick on 0, snare on 4, all 5 types, sweet density, 3 key pitches, 10 slots
  const slots = [
    makeSlot('kick'), makeSlot('snare'), makeSlot('hihat'),
    makeSlot('bass'), makeSlot('keys','C','mid'), makeSlot('keys','G','mid'),
    makeSlot('keys','E','high'), makeSlot('kick'), makeSlot('snare'), makeSlot('hihat'),
  ];
  slots[0].pattern[0] = true;
  slots[1].pattern[4] = true;
  [2,3,4,5,6].forEach(i => slots[i].pattern[0] = true);
  [0,1,2,3,4,5].forEach(i => { slots[i].pattern[2] = true; slots[i].pattern[6] = true; });
  for (let i = 0; i < 6; i++) slots[0].pattern[i] = true;
  const { grade } = computeGrade(slots);
  assertEqual(grade, 'S');
});

test('total < 35 → D', () => {
  const slots = [makeSlot('kick')];
  slots[0].pattern[1] = true; // off-beat kick only, no anchor
  const { grade } = computeGrade(slots);
  assertEqual(grade, 'D');
});

  assert(_isStanky('shit'),    'shit not caught');
  assert(_isStanky('bitch'),   'bitch not caught');
  assert(_isStanky('asshole'), 'asshole not caught');

});

test('l33t substitutions are caught (@→a, 3→e, !→i, 0→o, $→s)', () => {
  assert(_isStanky('f@ck'),  'f@ck (@ as a) not caught');
  assert(_isStanky('sh!t'),  'sh!t (! as i) not caught');
  assert(_isStanky('a$$h0le'), 'a$$h0le not caught');
  assert(_isStanky('b1tch'), 'b1tch (1 as i) not caught');
});

test('spaces between letters are caught', () => {
  assert(_isStanky('f u c k'),     'f u c k with spaces not caught');

  assert(_isStanky('my shit beat'), 'embedded "shit" not caught');
  assert(_isStanky('thefuckingbest'), 'embedded "fucking" not caught');
});

test('legitimate words with partial matches are not false-positives', () => {
  assert(!_isStanky('Classic Beat'),   '"class" in classic should not trigger');
  assert(!_isStanky('Scunthorpe Mix'), 'Scunthorpe should be fine (no word in list matches)');
  // Note: "Cocktail" contains "cock" after stripping and is intentionally blocked —
  // the tradeoff of substring matching over word-boundary matching.
  assert(_isStanky('Cocktail Jazz'),   'cocktail contains "cock" — known substring match');
});

// --- Scoreboard ---
suite('Scoreboard — tryAdd()');

test('qualifies when board is empty', () => {
  _testSB.clear();
  const r = _testSB.tryAdd(80, 75);
  assert(r.qualifies, 'should qualify on empty board');
  assertEqual(r.rank, 1);
});

test('qualifies when board has < 20 entries', () => {
  _testSB.clear();
  _testSB.addEntry({ ..._testSB.buildEntry('A', 'A', 80, 75, [], 120, 16), id: 't1' });
  const r = _testSB.tryAdd(60, 50);
  assert(r.qualifies, 'should qualify when board not full');
});

test('higher rawScore ranks above lower', () => {
  _testSB.clear();
  _testSB.addEntry({ ..._testSB.buildEntry('A', 'S', 90, 100, [], 120, 16), id: 't1' });
  const r = _testSB.tryAdd(95, 100);
  assert(r.qualifies, 'higher score should qualify');
  assertEqual(r.rank, 1, 'higher score should rank #1');
});

test('does not qualify when score is below full board worst', () => {
  _testSB.clear();
  // Fill 20 entries with score 50
  for (let i = 0; i < 20; i++) {
    _testSB.addEntry({ ..._testSB.buildEntry(`E${i}`, 'B', 50, 50, [], 120, 16), id: `t${i}` });
  }
  const r = _testSB.tryAdd(30, 25);
  assert(!r.qualifies, 'score below worst should not qualify');
  assertEqual(r.rank, null);
});

suite('Scoreboard — buildEntry()');

test('returns required fields', () => {
  const slots = [makeSlot('kick')];
  const e = _testSB.buildEntry('Test Beat', 'A', 80, 75, slots, 120, 16);
  assert(e.id,        'missing id');
  assert(e.name,      'missing name');
  assert(e.grade,     'missing grade');
  assert(e.timestamp, 'missing timestamp');
  assert(e.date,      'missing date');
  assert(Array.isArray(e.slots), 'slots should be array');
});

test('fallback name when empty string passed', () => {
  const e = _testSB.buildEntry('', 'B', 60, 50, [], 90, 16);
  assertEqual(e.name, 'Unnamed Beat');
});

test('slot patterns are copied as arrays', () => {
  const s = makeSlot('kick'); s.pattern[0] = true;
  const e = _testSB.buildEntry('X', 'A', 80, 75, [s], 120, 16);
  assert(Array.isArray(e.slots[0].pattern), 'pattern should be array');
  assert(e.slots[0].pattern[0], 'pattern[0] should be true');
});

suite('Scoreboard — addEntry() / persistence');

test('addEntry returns rank 1 for first entry', () => {
  _testSB.clear();
  const e = { ..._testSB.buildEntry('First', 'S', 100, 100, [], 120, 16), id: 'first1' };
  const rank = _testSB.addEntry(e);
  assertEqual(rank, 1);
});

test('higher score displaces lower score to rank 2', () => {
  _testSB.clear();
  const e1 = { ..._testSB.buildEntry('Low', 'A', 70, 75, [], 120, 16), id: 'low1' };
  _testSB.addEntry(e1);
  const e2 = { ..._testSB.buildEntry('High', 'S', 100, 100, [], 120, 16), id: 'high1' };
  const rank = _testSB.addEntry(e2);
  assertEqual(rank, 1, 'higher score should be rank 1');
  assertEqual(_testSB.getTop20()[0].id, 'high1', 'top20[0] should be the higher-score entry');
});

test('top20 never exceeds 20 entries', () => {
  _testSB.clear();
  for (let i = 0; i < 25; i++) {
    _testSB.addEntry({ ..._testSB.buildEntry(`B${i}`, 'B', 50 + i, 50, [], 120, 16), id: `b${i}` });
  }
  assert(_testSB.getTop20().length <= 20, 'top20 exceeded 20');
});

test('history records all entries including those outside top20', () => {
  _testSB.clear();
  for (let i = 0; i < 25; i++) {
    _testSB.addEntry({ ..._testSB.buildEntry(`B${i}`, 'B', 50 + i, 50, [], 120, 16), id: `h${i}` });
  }
  assertEqual(_testSB.historyCount(), 25, 'history should have all 25 entries');
});

test('tiebreak: earlier timestamp ranks higher', () => {
  _testSB.clear();
  const e1 = { ..._testSB.buildEntry('Old', 'S', 100, 100, [], 120, 16), id: 'old1', timestamp: 1000 };
  const e2 = { ..._testSB.buildEntry('New', 'S', 100, 100, [], 120, 16), id: 'new1', timestamp: 2000 };
  _testSB.addEntry(e2);
  _testSB.addEntry(e1);
  assertEqual(_testSB.getTop20()[0].id, 'old1', 'earlier timestamp should rank higher on tie');
});

// =====================
// === MOBILE FILE VALIDATION (async — fetches beat-maker-mobile.html) ===
// =====================
async function runMobileValidation() {
  let html = '';
  try {
    const res = await fetch('beat-maker-mobile.html');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    html = await res.text();
  } catch (e) {
    results.push({ suite: 'Mobile HTML Validation', name: 'fetch beat-maker-mobile.html', pass: false, err: e.message });
    renderResults();
    return;
  }

  suite('Mobile HTML Validation');

  test('viewport includes viewport-fit=cover', () => {
    assert(html.includes('viewport-fit=cover'), 'viewport meta missing viewport-fit=cover');
  });

  test('viewport disables user-scalable', () => {
    assert(html.includes('user-scalable=no'), 'user-scalable=no missing');
  });

  test('apple-mobile-web-app-capable meta tag present', () => {
    assert(html.includes('apple-mobile-web-app-capable'), 'apple-mobile-web-app-capable meta missing');
  });

  test('overscroll-behavior: none on body', () => {
    assert(html.includes('overscroll-behavior: none'), 'overscroll-behavior: none missing from body CSS');
  });

  test('-webkit-user-select: none on body', () => {
    assert(html.includes('-webkit-user-select: none'), '-webkit-user-select missing');
  });

  test('-webkit-touch-callout: none on body', () => {
    assert(html.includes('-webkit-touch-callout: none'), '-webkit-touch-callout missing');
  });

  test('min-height: 100dvh present', () => {
    assert(html.includes('100dvh'), '100dvh missing — iOS full-height fix absent');
  });

  test('-webkit-fill-available fallback present', () => {
    assert(html.includes('-webkit-fill-available'), '-webkit-fill-available missing');
  });

  test('env(safe-area-inset-bottom) on tab bar', () => {
    assert(html.includes('env(safe-area-inset-bottom)'), 'safe-area-inset-bottom missing from tabs');
  });

  test('global touchend audio unlock listener present (not touchstart — weaker iOS gesture)', () => {
    assert(
      html.includes('_globalAudioUnlock') || html.includes('touchend') && html.includes('unlockAudio'),
      'global touchend audio unlock listener missing'
    );
    assert(
      !html.includes("'touchstart', _touchUnlock") && !html.includes('"touchstart", _touchUnlock'),
      'old touchstart-based _touchUnlock still present — should have been replaced'
    );
  });

  test('silent buffer bootstrap in unlockAudio (fixes iOS currentTime-stuck-at-0 bug)', () => {
    assert(html.includes('_audioBootstrapped'), '_audioBootstrapped flag missing from unlockAudio');
    assert(html.includes('createBuffer(1, 1') || html.includes('createBuffer(1,1'), 'silent 1-sample buffer creation missing');
    assert(html.includes('createBufferSource'), 'BufferSource for silent unlock missing');
  });

  test('audio prompt uses touchend listener', () => {
    assert(html.includes("'touchend', acceptAudio") || html.includes('"touchend", acceptAudio'),
      'audio prompt missing touchend handler');
  });

  test('seq-scroll-outer wrapper present in HTML', () => {
    assert(html.includes('seq-scroll-outer'), 'seq-scroll-outer missing — 32-beat horizontal scroll not set up');
  });

  test('pad min-height ≥ 32px (mobile increase)', () => {
    const m = html.match(/\.pad\s*\{[^}]*min-height\s*:\s*(\d+)px/);
    assert(m && parseInt(m[1]) >= 32, `pad min-height should be ≥ 32px, found: ${m ? m[1] : 'none'}`);
  });

  test('touch-action: none suppresses rubber-band on SVG / game area', () => {
    assert(html.includes('touch-action:none') || html.includes('touch-action: none'),
      'touch-action: none not found');
  });

  test('overscroll-behavior-x: contain on scroll wrapper', () => {
    assert(html.includes('overscroll-behavior-x: contain'), 'overscroll-behavior-x: contain missing from scroll wrapper');
  });

  test('seq-label-cell min-height ≥ 32px', () => {
    const m = html.match(/\.seq-label-cell\s*\{[^}]*min-height\s*:\s*(\d+)px/);
    assert(m && parseInt(m[1]) >= 32, `seq-label-cell min-height should be ≥ 32px, found: ${m ? m[1] : 'none'}`);
  });

  test('changeBeatCount toggles 32-beat scroll class', () => {
    assert(html.includes('beats-32-active'), 'changeBeatCount does not set 32-beat scroll class');
  });

  // ── Top Hits / Scoreboard ──────────────────────────────────────────────
  test('scoreboard.js script tag present', () => {
    assert(html.includes('src="scoreboard.js"'), 'scoreboard.js script tag missing');
  });

  test('#tab-tophits div present', () => {
    assert(html.includes('id="tab-tophits"'), '#tab-tophits div missing');
  });

  test('Top Hits tab button present', () => {
    assert(html.includes("switchTab('tophits')"), 'Top Hits tab button missing');
  });

  test('naming modal present', () => {
    assert(html.includes('id="naming-modal"'), 'naming-modal div missing');
    assert(html.includes('id="naming-input"'), 'naming-input field missing');
    assert(html.includes('id="naming-rank"'),  'naming-rank span missing');
  });

  test('renderTopHits function defined', () => {
    assert(html.includes('function renderTopHits'), 'renderTopHits function missing');
  });

  test('loadBeatFromScore function defined', () => {
    assert(html.includes('function loadBeatFromScore'), 'loadBeatFromScore function missing');
  });

  test('checkScoreboard hooked into gradeBeat via setTimeout', () => {
    assert(html.includes('checkScoreboard'), 'checkScoreboard call missing');
    assert(html.includes('setTimeout') && html.includes('checkScoreboard'), 'checkScoreboard not called via setTimeout');
  });

  test('profanity filter present (_isStanky + word list)', () => {
    assert(html.includes('_isStanky'), '_isStanky function missing');
    assert(html.includes('_STANKY_WORDS'), '_STANKY_WORDS list missing');
    assert(html.includes('Keep it swanky, not stanky'), 'stanky error message missing');
  });

  test('seed beats array present', () => {
    assert(html.includes('_SEED_BEATS'), '_SEED_BEATS array missing');
    assert(html.includes('Gouda Vibrations'), 'seed beat "Gouda Vibrations" missing');
    assert(html.includes('Velveeta Vibes'),   'seed beat "Velveeta Vibes" missing');
  });

  test('seedLeaderboard function present and called', () => {
    assert(html.includes('function seedLeaderboard'), 'seedLeaderboard function missing');
    assert(html.includes('seedLeaderboard()'), 'seedLeaderboard() call missing');
  });

  test('resetLeaderboard function present with reset button', () => {
    assert(html.includes('function resetLeaderboard'), 'resetLeaderboard function missing');
    assert(html.includes('resetLeaderboard()'), 'resetLeaderboard() call on button missing');
  });

  test('switchTab handles tophits', () => {
    assert(html.includes("tab==='tophits'"), "switchTab missing 'tophits' branch");
    assert(html.includes('renderTopHits()'), 'switchTab does not call renderTopHits()');
  });

  renderResults();
}

// =====================
// === RENDER RESULTS ===
// =====================
function renderResults() {
  const suiteMap = {};
  results.forEach(r => {
    if (!suiteMap[r.suite]) suiteMap[r.suite] = [];
    suiteMap[r.suite].push(r);
  });

  const out = document.getElementById('output');
  out.innerHTML = '';
  const passed = results.filter(r => r.pass).length;
  const failed = results.filter(r => !r.pass).length;

  Object.entries(suiteMap).forEach(([suiteName, tests]) => {
    const div = document.createElement('div');
    div.className = 'suite';
    div.innerHTML = `<div class="suite-name">${suiteName}</div>`;
    tests.forEach(t => {
      const row = document.createElement('div');
      row.className = `test ${t.pass ? 'pass' : 'fail'}`;
      row.innerHTML = `<span class="icon">${t.pass ? '✓' : '✗'}</span><span>${t.name}</span>`;
      div.appendChild(row);
      if (!t.pass) {
        const err = document.createElement('div');
        err.className = 'err';
        err.textContent = t.err;
        div.appendChild(err);
      }
    });
    out.appendChild(div);
  });

  const summary = document.createElement('div');
  summary.className = `summary ${failed === 0 ? 'all-pass' : 'has-fail'}`;
  summary.textContent = failed === 0
    ? `✓ All ${passed} tests passed`
    : `✗ ${failed} failed, ${passed} passed (${results.length} total)`;
  out.appendChild(summary);
}

// Run sync tests first, then async mobile validation
renderResults();
runMobileValidation();
</script>
