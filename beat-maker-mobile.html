<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Swanky Cheese 🧀</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
  :root {
    --gold:#F5C518; --gold-dark:#C9920A; --gold-light:#FFE066;
    --purple:#4B0082; --purple-mid:#7B2FBE; --purple-light:#B06AE0;
    --pink:#FF2D78; --jet:#1A1A1A; --diamond:#E8F4FF;
    --bg:#0D0018; --card:#1A0030; --card2:#240040; --text:#FFF8DC;
    --radius:14px; --radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);
    min-height:100dvh;overflow-x:hidden;
    background-image:radial-gradient(ellipse at 20% 50%,rgba(75,0,130,.4) 0%,transparent 60%),
      radial-gradient(ellipse at 80% 20%,rgba(255,45,120,.2) 0%,transparent 50%);}
  h1,h2{font-family:'Fredoka One',cursive;}
  #app{max-width:520px;margin:0 auto;padding:10px 10px 80px;display:flex;flex-direction:column;gap:10px;}
  /* HEADER */
  header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
    background:var(--card);border-radius:var(--radius);border:1px solid rgba(245,197,24,.2);}
  header h1{font-size:1.2rem;color:var(--gold);}
  header h1 span{color:var(--pink);}
  .stats{display:flex;gap:12px;align-items:center;}
  .stat{text-align:center;}
  .stat-val{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--gold);line-height:1;}
  .stat-label{font-size:.58rem;text-transform:uppercase;letter-spacing:.5px;opacity:.6;}
  /* BOTTOM NAV */
  .tabs{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:100;
    background:var(--card);border-top:1px solid rgba(245,197,24,.2);
    padding-bottom:env(safe-area-inset-bottom);}
  .tab{flex:1;padding:10px 8px 8px;border:none;border-radius:0;
    font-family:'Fredoka One',cursive;font-size:.8rem;cursor:pointer;
    background:transparent;color:var(--text);opacity:.45;
    display:flex;flex-direction:column;align-items:center;gap:1px;transition:all .2s;}
  .tab .tab-icon{font-size:1.2rem;}
  .tab.active{opacity:1;background:rgba(123,47,190,.15);border-top:2px solid var(--gold);}
  /* LAYOUT */
  .main-area{display:flex;flex-direction:column;gap:10px;}
  /* STAGE */
  .stage{background:var(--card);border-radius:var(--radius);padding:10px 12px;
    border:1px solid rgba(245,197,24,.15);display:flex;flex-direction:row;align-items:center;gap:12px;}
  .stage h2{display:none;}
  .stage-left{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;}
  .stage-right{flex:1;display:flex;flex-direction:column;gap:6px;}
  .swanky-container{position:relative;width:88px;height:100px;display:flex;align-items:flex-end;justify-content:center;flex-shrink:0;}
  #swanky-svg,#wardrobe-swanky-svg{width:100%;height:100%;overflow:visible;}
  .level-badge{background:linear-gradient(135deg,var(--purple),var(--purple-mid));
    border:1.5px solid var(--gold);border-radius:14px;padding:2px 9px;
    font-family:'Fredoka One',cursive;font-size:.7rem;color:var(--gold);}
  .speech-bubble{background:var(--card2);border:1px solid rgba(245,197,24,.25);
    border-radius:10px;padding:7px 10px;font-size:.75rem;line-height:1.3;}
  /* DANCE — JS-driven pose system; only glow pulse remains in CSS */
  .playing-pulse #cheese-body{animation:cheese-glow .5s ease-in-out infinite alternate;}
  .playing-pulse #w-cheese-body{animation:cheese-glow .5s ease-in-out infinite alternate;}
  @keyframes cheese-glow{from{filter:drop-shadow(0 0 3px rgba(245,197,24,.4))}to{filter:drop-shadow(0 0 10px rgba(245,197,24,.9))}}

  /* BEAT LAB */
  .beat-lab{background:var(--card);border-radius:var(--radius);padding:12px;border:1px solid rgba(245,197,24,.15);}
  .beat-lab-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .beat-lab-header h2{font-size:.95rem;color:var(--gold-light);}

  /* SEQUENCER */
  .sequencer{display:flex;flex-direction:column;gap:4px;}
  .seq-row{display:grid;grid-template-columns:44px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr;gap:2px;align-items:center;}
  .pad{aspect-ratio:1;border-radius:3px;border:1px solid rgba(255,255,255,.08);
    cursor:pointer;background:rgba(255,255,255,.07);position:relative;overflow:hidden;min-height:24px;touch-action:manipulation;}
  .pad::after{content:'';position:absolute;inset:0;background:white;opacity:0;transition:opacity .04s;}
  .pad.active.kick  {background:#FF6B35;border-color:#FF8C5A;box-shadow:0 0 5px rgba(255,107,53,.5);}
  .pad.active.snare {background:#FFD166;border-color:#FFE08A;box-shadow:0 0 5px rgba(255,209,102,.5);}
  .pad.active.hihat {background:#06D6A0;border-color:#2FFFC4;box-shadow:0 0 5px rgba(6,214,160,.5);}
  .pad.active.bass  {background:#B06AE0;border-color:#C97AF5;box-shadow:0 0 5px rgba(176,106,224,.5);}
  .pad.active.keys  {background:#00E5FF;border-color:#66F0FF;box-shadow:0 0 5px rgba(0,229,255,.5);}
  .pad.playing::after{opacity:.4;}
  .pad:active{filter:brightness(1.4);}

  /* PLAYHEAD + BEAT MARKER */
  .beat-marker{height:3px;margin:1px 0;display:grid;grid-template-columns:44px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr;gap:2px;}
  .beat-marker-item{border-radius:2px;background:rgba(255,255,255,.04);}
  .beat-marker-item.bar-start{background:rgba(245,197,24,.4);}
  .beat-marker-item.beat-start{background:rgba(245,197,24,.15);}
  .playhead-row{display:grid;grid-template-columns:44px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr;gap:2px;height:3px;margin-bottom:3px;}
  .beat-number-row{height:10px;margin-bottom:1px;display:grid;grid-template-columns:44px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr;gap:2px;}
  .beat-num{font-family:'Fredoka One',cursive;font-size:.46rem;color:rgba(245,197,24,.45);text-align:center;line-height:10px;letter-spacing:.3px;}
  .beat-num.downbeat{color:rgba(245,197,24,.8);}
  .pad.downbeat{background:rgba(245,197,24,.06);border-color:rgba(245,197,24,.3);border-radius:4px;}
  .pad.downbeat.active{border-color:var(--gold);box-shadow:0 0 8px rgba(245,197,24,.55),0 0 5px rgba(245,197,24,.3);}
  .playhead-cell{border-radius:2px;background:transparent;transition:background .04s;}
  .playhead-cell.active{background:var(--gold);}

  /* SLOT WRAPPER + ANIMATIONS */
  .seq-slot-wrapper{display:flex;flex-direction:column;}
  @keyframes slotAppear{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slotRemove{from{opacity:1;transform:scaleY(1);max-height:60px}to{opacity:0;transform:scaleY(0.85);max-height:0}}
  .slot-appearing{animation:slotAppear .25s cubic-bezier(.34,1.56,.64,1) forwards;}

  /* LABEL CELL */
  .seq-label-cell{
    display:flex;flex-direction:column;align-items:flex-start;justify-content:center;
    padding:2px 3px 2px 4px;border-radius:6px;cursor:pointer;position:relative;
    border:1px solid transparent;transition:background .12s,border-color .12s;
    min-height:24px;
  }
  .seq-label-cell:active{filter:brightness(1.3);}
  .seq-label-cell.open{background:rgba(255,255,255,.06);}
  .seq-label-text{font-family:'Fredoka One',cursive;font-size:.52rem;text-transform:uppercase;line-height:1;letter-spacing:.3px;}
  .seq-label-sub{font-size:.42rem;font-family:'Nunito',sans-serif;opacity:.75;line-height:1;margin-top:1px;}
  .seq-remove-btn{
    position:absolute;top:1px;right:2px;width:14px;height:14px;
    display:flex;align-items:center;justify-content:center;
    font-size:.5rem;opacity:.45;background:transparent;border:none;
    color:inherit;cursor:pointer;border-radius:3px;padding:0;
    touch-action:manipulation;transition:opacity .1s,background .1s;
  }
  .seq-remove-btn:hover,.seq-remove-btn:active{opacity:1;background:rgba(255,255,255,.12);}

  /* INSTRUMENT PICKER */
  .inst-picker{overflow:hidden;max-height:0;opacity:0;
    transition:max-height .22s cubic-bezier(.4,0,.2,1),opacity .18s ease;margin-bottom:0;}
  .inst-picker.open{max-height:140px;opacity:1;margin-bottom:3px;}
  .inst-picker-inner{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
    border-radius:8px;padding:6px;display:flex;flex-direction:column;gap:5px;}
  .inst-choice-row{display:flex;gap:4px;}
  .inst-choice-btn{
    flex:1;padding:5px 2px;border-radius:6px;border:1.5px solid transparent;
    background:rgba(255,255,255,.06);font-family:'Fredoka One',cursive;font-size:.6rem;
    color:var(--text);cursor:pointer;display:flex;flex-direction:column;align-items:center;
    gap:2px;touch-action:manipulation;transition:all .1s;
  }
  .inst-choice-btn .ic-emoji{font-size:.85rem;line-height:1;}
  .inst-choice-btn .ic-name{font-size:.45rem;opacity:.7;}
  .inst-choice-btn.selected{background:rgba(255,255,255,.1);}
  .inst-choice-btn:active{transform:scale(.94);filter:brightness(1.3);}

  /* KEYS CONFIG */
  .keys-config{overflow:hidden;max-height:0;opacity:0;
    transition:max-height .18s ease,opacity .15s ease;}
  .keys-config.show{max-height:72px;opacity:1;}
  .keys-config-inner{display:flex;flex-direction:column;gap:4px;padding-top:5px;
    border-top:1px solid rgba(0,229,255,.2);}
  .keys-config-row{display:flex;align-items:center;gap:4px;}
  .keys-config-label{font-size:.48rem;color:#00E5FF;opacity:.75;width:34px;flex-shrink:0;
    font-family:'Fredoka One',cursive;text-transform:uppercase;}
  .note-btn,.octave-btn{
    flex:1;padding:4px 2px;border-radius:5px;border:1.5px solid rgba(0,229,255,.2);
    background:rgba(0,229,255,.05);color:#00E5FF;font-family:'Fredoka One',cursive;
    font-size:.58rem;cursor:pointer;touch-action:manipulation;transition:all .08s;text-align:center;
  }
  .note-btn.selected,.octave-btn.selected{
    background:rgba(0,229,255,.2);border-color:#00E5FF;box-shadow:0 0 6px rgba(0,229,255,.3);}
  .note-btn:active,.octave-btn:active{transform:scale(.93);filter:brightness(1.4);}

  /* ADD ROW BAR */
  .add-row-bar{display:flex;align-items:center;justify-content:space-between;margin:6px 0 4px;padding:0 2px;}
  .add-row-btn{
    background:transparent;border:1.5px dashed rgba(245,197,24,.4);border-radius:8px;
    padding:6px 14px;color:rgba(245,197,24,.7);font-family:'Fredoka One',cursive;
    font-size:.78rem;cursor:pointer;touch-action:manipulation;transition:all .15s;letter-spacing:.3px;
  }
  .add-row-btn:hover,.add-row-btn:active{
    border-color:var(--gold);color:var(--gold);
    background:rgba(245,197,24,.08);box-shadow:0 0 10px rgba(245,197,24,.15);}
  .row-count-badge{font-size:.6rem;font-family:'Fredoka One',cursive;
    color:rgba(255,255,255,.3);letter-spacing:.5px;}
  .row-count-badge span{color:rgba(255,255,255,.6);}
  .row-count-badge.at-max span{color:var(--gold);}

  /* RANDOM BEAT GENERATOR */
  .genre-bar{display:flex;gap:6px;margin:8px 0 4px;align-items:stretch;}
  .btn-surprise{
    flex:1;padding:10px 8px;border:none;border-radius:var(--radius-sm);
    background:linear-gradient(135deg,var(--pink),var(--purple-mid));
    color:white;font-family:'Fredoka One',cursive;font-size:.88rem;
    cursor:pointer;touch-action:manipulation;transition:all .12s;letter-spacing:.3px;
  }
  .btn-surprise:active{transform:scale(.96);filter:brightness(1.15);}
  .genre-picker-wrap{position:relative;flex:1;}
  .btn-genre-pick{
    width:100%;height:100%;padding:10px 8px;border:1.5px solid rgba(245,197,24,.35);
    border-radius:var(--radius-sm);background:rgba(245,197,24,.07);
    color:var(--gold);font-family:'Fredoka One',cursive;font-size:.88rem;
    cursor:pointer;touch-action:manipulation;transition:all .12s;
  }
  .btn-genre-pick:active,.btn-genre-pick.open{
    background:rgba(245,197,24,.14);border-color:var(--gold);}
  .genre-picker{
    position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:50;
    background:var(--card2);border:1px solid rgba(245,197,24,.25);
    border-radius:var(--radius-sm);padding:8px;
    display:flex;flex-wrap:wrap;gap:5px;
    opacity:0;pointer-events:none;transform:translateY(-6px);
    transition:opacity .18s ease,transform .18s ease;
  }
  .genre-picker.open{opacity:1;pointer-events:all;transform:translateY(0);}
  .genre-pill{
    padding:5px 10px;border-radius:20px;border:1.5px solid rgba(255,255,255,.15);
    background:rgba(255,255,255,.06);color:var(--text);
    font-family:'Fredoka One',cursive;font-size:.72rem;
    cursor:pointer;touch-action:manipulation;transition:all .1s;white-space:nowrap;
  }
  .genre-pill:hover,.genre-pill:active{border-color:var(--gold);color:var(--gold);background:rgba(245,197,24,.1);}
  .genre-pill.swanky{border-color:var(--pink);color:var(--pink);}
  .genre-pill.swanky:hover,.genre-pill.swanky:active{background:rgba(255,45,120,.15);}

  /* CONTROLS */
  .controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
  .btn{padding:13px 10px;border:none;border-radius:var(--radius-sm);
    font-family:'Fredoka One',cursive;font-size:.95rem;cursor:pointer;
    transition:all .1s;touch-action:manipulation;}
  .btn-play{background:var(--gold);color:var(--jet);font-size:1rem;}
  .btn-play:active{filter:brightness(1.1);transform:scale(.97);}
  .btn-play.playing{background:var(--pink);color:white;}
  .btn-clear{background:transparent;color:var(--text);border:1px solid rgba(255,255,255,.2);font-size:.85rem;}
  .btn-clear:active{background:rgba(255,255,255,.08);}
  .btn-grade{background:var(--purple-mid);color:white;grid-column:1/-1;font-size:1.05rem;padding:14px;}
  .btn-grade:active{filter:brightness(1.2);transform:scale(.98);}
  .bpm-control{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);
    padding:8px 10px;border-radius:var(--radius-sm);grid-column:1/-1;}
  .bpm-control label{font-size:.7rem;opacity:.6;white-space:nowrap;}
  .bpm-control input[type=range]{flex:1;accent-color:var(--gold);}
  #bpm-display{font-family:'Fredoka One',cursive;color:var(--gold);min-width:28px;font-size:.9rem;}

  /* GRADE PANEL */
  .grade-panel{margin-top:10px;padding:12px;background:var(--card2);border-radius:var(--radius-sm);
    border:1px solid rgba(245,197,24,.1);display:none;}
  .grade-panel.show{display:block;animation:fadeSlide .3s ease;}
  @keyframes fadeSlide{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .grade-display{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
  .grade-letter{font-family:'Fredoka One',cursive;font-size:2.8rem;line-height:1;
    text-shadow:0 0 16px currentColor;flex-shrink:0;}
  .grade-s{color:var(--gold);}.grade-a{color:#00E5FF;}
  .grade-b{color:#69FF47;}.grade-c{color:#FFD166;}.grade-d{color:#FF6B9D;}
  .grade-meta{flex:1;min-width:0;}
  .grade-message{font-weight:700;font-size:.82rem;margin-bottom:3px;}
  .grade-points{font-size:.72rem;opacity:.7;}
  .grade-hint{padding:8px 10px;background:rgba(75,0,130,.3);border-radius:var(--radius-sm);
    border-left:3px solid var(--purple-light);font-size:.78rem;color:var(--diamond);margin-top:8px;}
  .grade-hint strong{color:var(--gold-light);}
  .score-bars{display:flex;flex-direction:column;gap:4px;margin:8px 0;}
  .score-bar-row{display:flex;align-items:center;gap:6px;font-size:.68rem;}
  .score-bar-label{width:80px;opacity:.7;flex-shrink:0;}
  .score-bar-track{flex:1;height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
  .score-bar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.34,1.56,.64,1);background:var(--purple-light);}
  .score-bar-val{width:32px;text-align:right;opacity:.8;flex-shrink:0;}

  /* VOICE ROW */
  .voice-row{display:flex;align-items:center;gap:6px;margin-top:6px;
    padding:5px 8px;background:rgba(255,45,120,.06);border-radius:var(--radius-sm);border:1px solid rgba(255,45,120,.15);}
  .voice-row label{font-size:.65rem;color:var(--pink);opacity:.8;white-space:nowrap;}
  .voice-toggle{position:relative;width:36px;height:20px;cursor:pointer;flex-shrink:0;}
  .voice-toggle input{opacity:0;width:0;height:0;}
  .voice-slider{position:absolute;inset:0;background:rgba(255,255,255,.15);border-radius:10px;transition:.2s;}
  .voice-slider::before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;
    background:white;border-radius:50%;transition:.2s;}
  .voice-toggle input:checked+.voice-slider{background:var(--pink);}
  .voice-toggle input:checked+.voice-slider::before{transform:translateX(16px);}
  .voice-phrases{font-size:.62rem;color:rgba(255,45,120,.7);flex:1;font-style:italic;}
  .mode-toggle{display:flex;background:rgba(255,255,255,.05);border-radius:var(--radius-sm);
    overflow:hidden;border:1px solid rgba(255,255,255,.1);}
  .mode-btn{flex:1;padding:6px 8px;border:none;background:transparent;
    color:var(--text);font-family:'Fredoka One',cursive;font-size:.78rem;
    cursor:pointer;opacity:.5;transition:all .15s;touch-action:manipulation;}
  .mode-btn.active{background:var(--purple-mid);opacity:1;}

  /* LIVE TAP */
  .tap-area{display:none;}
  .tap-area.show{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
  .tap-btn{height:62px;border:none;border-radius:var(--radius-sm);
    font-family:'Fredoka One',cursive;font-size:.95rem;cursor:pointer;touch-action:manipulation;transition:all .06s;}
  .tap-btn:active{transform:scale(.93);filter:brightness(1.3);}
  .tap-progress{height:5px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:6px;grid-column:1/-1;}
  .tap-progress-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .1s linear;width:0%;}

  /* WARDROBE */
  .wardrobe-panel{display:none;}
  .wardrobe-panel.active{display:flex;flex-direction:column;gap:10px;}
  .wardrobe-swanky{background:var(--card);border-radius:var(--radius);padding:12px 14px;
    border:1px solid rgba(245,197,24,.15);display:flex;flex-direction:row;align-items:center;gap:14px;}
  .wardrobe-swanky .swanky-container{width:90px;height:102px;}
  .wardrobe-swanky-right{flex:1;display:flex;flex-direction:column;gap:6px;}
  .wardrobe-items{background:var(--card);border-radius:var(--radius);padding:12px;border:1px solid rgba(245,197,24,.15);}
  .wardrobe-items h2{font-size:.95rem;color:var(--gold-light);margin-bottom:10px;}
  .slot-tabs{display:flex;gap:5px;overflow-x:auto;margin-bottom:10px;padding-bottom:2px;scrollbar-width:none;}
  .slot-tabs::-webkit-scrollbar{display:none;}
  .slot-tab{padding:5px 11px;border-radius:14px;border:1px solid rgba(255,255,255,.15);
    background:transparent;color:var(--text);font-size:.72rem;cursor:pointer;
    white-space:nowrap;touch-action:manipulation;transition:all .12s;}
  .slot-tab.active{background:var(--purple-mid);border-color:var(--purple-light);}
  .items-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
  .item-card{background:var(--card2);border-radius:var(--radius-sm);padding:9px 6px;
    text-align:center;border:2px solid transparent;cursor:pointer;position:relative;touch-action:manipulation;transition:all .1s;}
  .item-card.unlocked{border-color:rgba(255,255,255,.12);}
  .item-card.unlocked:active{border-color:var(--gold);transform:scale(.96);}
  .item-card.equipped{border-color:var(--gold);background:rgba(245,197,24,.08);}
  .item-card.locked{opacity:.36;cursor:not-allowed;}
  .item-emoji{font-size:1.5rem;margin-bottom:3px;}
  .item-name{font-size:.63rem;font-weight:700;margin-bottom:2px;}
  .item-cost{font-size:.58rem;color:var(--gold);font-family:'Fredoka One',cursive;}
  .item-cost.owned{color:#06D6A0;}
  .equipped-badge{position:absolute;top:3px;right:3px;background:var(--gold);color:var(--jet);
    font-size:.48rem;font-weight:900;padding:1px 3px;border-radius:3px;}

  /* TIER NAVIGATION */
  .tier-nav{display:flex;gap:5px;margin-bottom:8px;}
  .tier-pill{flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid transparent;cursor:pointer;
    font-family:'Fredoka One',cursive;text-align:center;touch-action:manipulation;transition:all .15s;position:relative;}
  .tier-pill .tp-num{display:block;font-size:1rem;line-height:1;}
  .tier-pill .tp-name{display:block;font-size:.38rem;opacity:.75;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tier-pill .tp-req{display:block;font-size:.38rem;opacity:.5;margin-top:1px;}
  .tier-pill.locked{opacity:.38;cursor:default;}
  .tier-pill.locked::after{content:'🔒';position:absolute;top:2px;right:4px;font-size:.55rem;}
  .tier-1-pill{background:rgba(255,45,120,.1);border-color:rgba(255,45,120,.3);color:#FF2D78;}
  .tier-1-pill.active{background:rgba(255,45,120,.22);border-color:#FF2D78;box-shadow:0 0 8px rgba(255,45,120,.3);}
  .tier-2-pill{background:rgba(176,106,224,.1);border-color:rgba(176,106,224,.3);color:#B06AE0;}
  .tier-2-pill.active{background:rgba(176,106,224,.22);border-color:#B06AE0;box-shadow:0 0 8px rgba(176,106,224,.3);}
  .tier-3-pill{background:rgba(0,229,255,.07);border-color:rgba(0,229,255,.28);color:#00E5FF;}
  .tier-3-pill.active{background:rgba(0,229,255,.16);border-color:#00E5FF;box-shadow:0 0 8px rgba(0,229,255,.25);}
  .tier-4-pill{background:rgba(245,197,24,.07);border-color:rgba(245,197,24,.28);color:#F5C518;}
  .tier-4-pill.active{background:rgba(245,197,24,.16);border-color:var(--gold);box-shadow:0 0 8px rgba(245,197,24,.25);}
  .tier-locked-notice{text-align:center;padding:24px 10px;color:rgba(255,255,255,.45);
    font-family:'Fredoka One',cursive;grid-column:1/-1;}
  .tier-locked-notice .lock-emoji{font-size:2rem;display:block;margin-bottom:6px;}
  .tier-locked-notice .lock-detail{font-size:.72rem;color:var(--gold);margin-top:4px;}

  /* TOAST */
  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-60px);
    z-index:999;background:var(--gold);color:var(--jet);font-family:'Fredoka One',cursive;
    font-size:1rem;padding:8px 18px;border-radius:20px;opacity:0;
    transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

  /* AUDIO PERMISSION BANNER */
  #audio-prompt{position:fixed;bottom:calc(56px + env(safe-area-inset-bottom));left:0;right:0;
    z-index:300;background:var(--card2);border-top:1px solid rgba(245,197,24,.35);
    padding:12px 14px;display:none;align-items:center;gap:10px;animation:fadeSlide .3s ease;}
  #audio-prompt .ap-text{flex:1;font-family:'Fredoka One',cursive;font-size:.9rem;color:var(--text);}
  #audio-prompt .ap-text span{display:block;font-size:.68rem;font-family:'Nunito',sans-serif;opacity:.6;margin-top:1px;}
  .ap-accept{background:var(--gold);color:var(--jet);border:none;border-radius:var(--radius-sm);
    padding:9px 16px;font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer;touch-action:manipulation;white-space:nowrap;}
  .ap-accept:active{filter:brightness(1.1);}
  .ap-dismiss{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);
    border-radius:var(--radius-sm);padding:9px 12px;font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer;touch-action:manipulation;}
  .ap-dismiss:active{background:rgba(255,255,255,.08);}

  /* DESKTOP ≥ 540px */
  @media(min-width:540px){
    #app{max-width:860px;padding:16px 16px 80px;gap:14px;}
    header h1{font-size:1.5rem;}
    .main-area{flex-direction:row;align-items:flex-start;}
    .beat-lab{flex:1;}
    .stage{flex-direction:column;width:190px;flex-shrink:0;align-items:center;}
    .stage h2{display:block;font-size:.9rem;color:var(--gold-light);}
    .stage-right{align-items:center;}
    .swanky-container{width:140px;height:158px;}
    .seq-row{grid-template-columns:56px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr;gap:4px;}
    .beat-marker{grid-template-columns:56px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr;gap:4px;}
    .playhead-row{grid-template-columns:56px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr;gap:4px;}
    .beat-number-row{grid-template-columns:56px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr;gap:4px;}
    .pad{min-height:30px;}
    .items-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr));}
    .wardrobe-panel.active{flex-direction:row;}
    .wardrobe-swanky{flex-direction:column;width:200px;flex-shrink:0;align-items:center;}
    .wardrobe-swanky .swanky-container{width:140px;height:158px;}
    .wardrobe-swanky-right{align-items:center;}
    .beats-8 .seq-row,.beats-8 .beat-marker,.beats-8 .playhead-row,.beats-8 .beat-number-row{grid-template-columns:56px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr;gap:4px;}
    .beats-32 .seq-row,.beats-32 .beat-marker,.beats-32 .playhead-row,.beats-32 .beat-number-row{grid-template-columns:56px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr 8px 1fr 1fr 1fr 1fr;gap:4px;}
  }

  /* BEAT COUNT OVERRIDES */
  .beats-8 .seq-row,.beats-8 .beat-marker,.beats-8 .playhead-row,.beats-8 .beat-number-row{grid-template-columns:44px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr;}
  .beats-32 .seq-row,.beats-32 .beat-marker,.beats-32 .playhead-row,.beats-32 .beat-number-row{grid-template-columns:44px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr 6px 1fr 1fr 1fr 1fr;}
  .beats-32 .pad{min-height:18px;}

  /* BEAT COUNT TOGGLE */
  .beat-lab-header{flex-direction:column;gap:6px;align-items:stretch;justify-content:flex-start;}
  .beat-lab-header-top{display:flex;align-items:center;justify-content:space-between;}
  .beat-count-row{display:flex;align-items:center;gap:8px;}
  .beat-count-label{font-size:.65rem;opacity:.6;white-space:nowrap;}
  .beat-count-toggle{display:flex;background:rgba(255,255,255,.05);border-radius:var(--radius-sm);overflow:hidden;border:1px solid rgba(255,255,255,.1);}
  .beat-count-btn{flex:1;padding:5px 12px;border:none;background:transparent;color:var(--text);font-family:'Fredoka One',cursive;font-size:.78rem;cursor:pointer;opacity:.5;transition:all .15s;touch-action:manipulation;}
  .beat-count-btn.active{background:var(--purple-mid);opacity:1;}

  /* ===================================
   * MOBILE-SPECIFIC OVERRIDES
   * =================================== */

  /* Fix iOS 100dvh toolbar bug */
  html { height: -webkit-fill-available; }
  body {
    overscroll-behavior: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    min-height: 100dvh;
    min-height: -webkit-fill-available;
  }

  /* Safe-area top padding so header clears notch */
  #app { padding-top: max(10px, env(safe-area-inset-top)); }

  /* Stronger bottom safe-area on tab bar */
  .tabs { padding-bottom: max(env(safe-area-inset-bottom), 6px); }

  /* Increase pad tap targets */
  .pad { min-height: 32px; }
  .beats-32 .pad { min-height: 22px; }

  /* Increase label cell and remove-button tap targets */
  .seq-label-cell { min-height: 32px; }
  .seq-remove-btn { width: 22px; height: 22px; font-size: .58rem; top: 0; right: 1px; }

  /* Taller BPM slider for fat-finger input */
  .bpm-control input[type=range] { height: 36px; cursor: pointer; }

  /* Larger beat-count toggle buttons */
  .beat-count-btn { padding: 7px 12px; }

  /* 32-beat horizontal scroll — wraps sequencer + header rows */
  .seq-scroll-outer {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-x: contain;
    margin: 0 -4px;
    padding: 0 4px 4px;
  }
  .seq-scroll-inner {
    /* min-width set by JS when 32 beats are active */
    min-width: 100%;
  }

  /* 32-beat: give grid a concrete minimum so pads stay usable */
  .beats-32 .seq-scroll-inner {
    min-width: 580px;
  }

  /* Prevent text selection across all interactive children */
  button, .pad, .seq-label-cell, .item-card, .tier-pill, .slot-tab, .tap-btn {
    -webkit-user-select: none;
    user-select: none;
  }

  /* Remove hover styles that don't apply on touch */
  @media (hover: none) {
    .add-row-btn:hover,
    .btn-genre-pick:hover,
    .genre-pill:hover,
    .genre-pill.swanky:hover,
    .inst-choice-btn:hover,
    .note-btn:hover,
    .octave-btn:hover,
    .seq-remove-btn:hover { background: unset; filter: unset; box-shadow: unset; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <h1>🧀 Swanky <span>Cheese</span></h1>

            </div>
          </div>
          <div class="beat-count-row">
            <span class="beat-count-label">Beats:</span>
            <div class="beat-count-toggle">
              <button class="beat-count-btn" data-beats="8" onclick="changeBeatCount(8)">8</button>
              <button class="beat-count-btn active" data-beats="16" onclick="changeBeatCount(16)">16</button>
              <button class="beat-count-btn" data-beats="32" onclick="changeBeatCount(32)">32</button>
            </div>

        </div>

        <!-- Scrollable container for sequencer grid (enables horizontal scroll on 32-beat) -->
        <div class="seq-scroll-outer" id="seq-scroll-outer">

            <div class="beat-number-row" id="beat-number-row"></div>

            <div class="playhead-row" id="playhead-row"></div>

        <!-- Add Row Bar -->
        <div class="add-row-bar">
          <button class="add-row-btn" id="add-row-btn" onclick="addSlot()">+ Add Row</button>
          <span class="row-count-badge" id="row-count-badge"><span>6</span> / 12 rows</span>
        </div>

        <!-- Random Beat Generator -->
        <div class="genre-bar">
          <button class="btn-surprise" id="btn-surprise" onclick="surpriseMe()">🎲 Surprise Me!</button>
          <div class="genre-picker-wrap">
            <button class="btn-genre-pick" id="btn-genre-pick" onclick="toggleGenrePicker()">🎵 Pick Genre ▾</button>
            <div class="genre-picker" id="genre-picker"></div>
          </div>
        </div>

        <!-- Voice control -->
        <div class="voice-row">
          <label>🎤 Swanky's Voice</label>

            <span class="voice-slider"></span>

          <span class="voice-phrases" id="voice-phrase-preview">"Swanky!" · "Drop the beat!"</span>

        <!-- Live Tap area (buttons built dynamically) -->
        <div class="tap-area" id="tap-area">
          <div class="tap-progress"><div class="tap-progress-fill" id="tap-progress-fill"></div></div>
        </div>

        <!-- Controls -->
        <div class="controls">
          <button class="btn btn-play" id="btn-play" onclick="togglePlay()">▶ Play Beat</button>
          <button class="btn btn-clear" onclick="clearBeat()">Clear</button>
          <button class="btn btn-grade" onclick="gradeBeat()">Grade It! 🎓</button>
          <div class="bpm-control">
            <label>BPM</label>
            <input type="range" min="70" max="140" value="90" id="bpm-range" oninput="setBPM(this.value)">
            <span id="bpm-display">90</span>

<script>
// =====================
// === STATE ===
// =====================
const STATE = {
  points: 0,
  level: 1,
  streak: 0,
  bpm: 90,
  isPlaying: false,
  currentStep: -1,
  mode: 'step',
  beatCount: 16,
  tapRecording: false,
  tapStartTime: 0,
  tapDuration: 8000,
  equippedItems: { head: null, eyes: null, body: null, mouth: null, feet: null, hands: null, gear: null },
  unlockedItems: new Set(),
  gradeHistory: [],
  currentDanceIndex: 0,
  dances: ['dance-idle','dance-shimmy','dance-slide','dance-shake','dance-bounce','dance-dip','dance-swagger'],
};

// =====================
// === INSTRUMENT DATA MODEL ===
// =====================
const INST_META = {
  kick:  { label: 'Kick',   short: 'KICK', color: '#FF6B35', emoji: '🔴', cssClass: 'kick'  },
  snare: { label: 'Snare',  short: 'SNAR', color: '#FFD166', emoji: '🟡', cssClass: 'snare' },
  hihat: { label: 'Hi-Hat', short: 'HIHT', color: '#06D6A0', emoji: '🟢', cssClass: 'hihat' },
  bass:  { label: 'Bass',   short: 'BASS', color: '#B06AE0', emoji: '🟣', cssClass: 'bass'  },
  keys:  { label: 'Keys',   short: 'KEYS', color: '#00E5FF', emoji: '🎹', cssClass: 'keys'  },
};
const NOTES = ['C','D','E','F','G','A','B'];
const OCTAVES = ['low','mid','high'];
const OCTAVE_NUM = { low: 3, mid: 4, high: 5 };

function makeSlot(instrument = 'kick', note = 'C', octave = 'mid') {
  return { instrument, note, octave, pattern: new Array(STATE.beatCount).fill(false) };
}

let SLOTS = [
  makeSlot('kick'),
  makeSlot('snare'),
  makeSlot('hihat'),
  makeSlot('bass'),
  makeSlot('keys', 'C', 'mid'),
  makeSlot('keys', 'G', 'mid'),
];

let openPickerIndex = -1;

// =====================
// === VOICE ===
// =====================
const VOICE_START = ["Swanky!","Let's get cheesy!","Drop the beat!","Gouda vibes only!","It's cheddar time!","Let's get this cheddar!"];
const VOICE_END = ["That's a wrap, cheddar!","Aged to perfection!","Mmm, that was sharp!","Fondue that again!","Oh that was gouda!","You're on a roll-e!"];

function speak(phrases) {
  if (!document.getElementById('voice-toggle').checked) return;
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(phrases[Math.floor(Math.random()*phrases.length)]);
  msg.rate = 1.05; msg.pitch = 1.3; msg.volume = 0.9;
  const voices = window.speechSynthesis.getVoices();
  const pick = voices.find(v => v.name.includes('Samantha') || v.name.includes('Google UK') || v.name.includes('Karen')) || voices[0];
  if (pick) msg.voice = pick;
  window.speechSynthesis.speak(msg);
}
if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

// =====================
// === AUDIO ENGINE ===
// =====================
let _audioCtx = null;
function getCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}
let _audioBootstrapped = false;
async function unlockAudio() {
  const ctx = getCtx();
  if (ctx.state === 'suspended') await ctx.resume();
  // iOS Safari: ctx.resume() resolves but currentTime stays 0 until audio actually flows.
  // Playing a 1-sample silent buffer kicks the clock into motion.
  if (!_audioBootstrapped && ctx.state === 'running') {
    _audioBootstrapped = true;
    const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
  }
}

// Mobile: unlock AudioContext on first touchend (touchstart is a weaker gesture signal on iOS Safari)
document.addEventListener('touchend', function _globalAudioUnlock() {
  unlockAudio().catch(() => {});
}, { passive: true, once: true });

const NOTE_FREQ = {
  'C3':130.81,'D3':146.83,'E3':164.81,'F3':174.61,'G3':196.00,'A3':220.00,'B3':246.94,
  'C4':261.63,'D4':293.66,'Eb4':311.13,'E4':329.63,'F4':349.23,'Gb4':369.99,'G4':392.00,'Ab4':415.30,'A4':440.00,'Bb4':466.16,'B4':493.88,
  'C5':523.25,'D5':587.33,'Eb5':622.25,'E5':659.25,'F5':698.46,'Gb5':739.99,'G5':783.99,'Ab5':830.61,'A5':880.00,'Bb5':932.33,'B5':987.77,
  'C6':1046.50,'D6':1174.66,'Eb6':1244.51,'E6':1318.51,'F6':1396.91,'G6':1567.98,'A6':1760.00,
};

function getKeyFreq(note, octave) {
  return NOTE_FREQ[note + OCTAVE_NUM[octave]] || 440;
}

function playKick(t) {
  const ctx = getCtx();
  const osc = ctx.createOscillator(), g = ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.frequency.setValueAtTime(160, t);
  osc.frequency.exponentialRampToValueAtTime(0.001, t + 0.4);
  g.gain.setValueAtTime(1.0, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  osc.start(t); osc.stop(t + 0.4);
}
function playSnare(t) {
  const ctx = getCtx();
  const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.15), ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), g = ctx.createGain();
  hp.type = 'highpass'; hp.frequency.value = 1500;
  g.gain.setValueAtTime(0.7, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  src.buffer = buf; src.connect(hp); hp.connect(g); g.connect(ctx.destination);
  src.start(t); src.stop(t + 0.15);
}
function playHihat(t) {
  const ctx = getCtx();
  const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.04), ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource(), bp = ctx.createBiquadFilter(), g = ctx.createGain();
  bp.type = 'bandpass'; bp.frequency.value = 9000; bp.Q.value = 0.8;
  g.gain.setValueAtTime(0.35, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
  src.buffer = buf; src.connect(bp); bp.connect(g); g.connect(ctx.destination);
  src.start(t); src.stop(t + 0.04);
}
function playBass(t) {
  const ctx = getCtx();
  const osc = ctx.createOscillator(), g = ctx.createGain();
  osc.type = 'sawtooth'; osc.frequency.value = 65.41;
  osc.connect(g); g.connect(ctx.destination);
  g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  osc.start(t); osc.stop(t + 0.25);
}
function playMelodyNote(note, t) {
  const ctx = getCtx();
  const freq = NOTE_FREQ[note] || 440;
  const osc = ctx.createOscillator(), g = ctx.createGain();
  osc.type = 'triangle'; osc.frequency.value = freq;
  osc.connect(g); g.connect(ctx.destination);
  g.gain.setValueAtTime(0.35, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  osc.start(t); osc.stop(t + 0.35);
}

function playSlot(slot, t) {
  switch (slot.instrument) {
    case 'kick':  playKick(t);  break;
    case 'snare': playSnare(t); break;
    case 'hihat': playHihat(t); break;
    case 'bass':  playBass(t);  break;
    case 'keys':  playMelodyNote(slot.note + OCTAVE_NUM[slot.octave], t); break;
  }
}

function triggerSound(slotIdx) {
  const ctx = getCtx();
  if (ctx.state !== 'running') return;
  playSlot(SLOTS[slotIdx], ctx.currentTime + 0.01);
}

// =====================
// === SEQUENCER ENGINE ===
// =====================
let _seqTimer = null, _seqStep = 0, _seqNextTime = 0;
const SEQ_LOOKAHEAD = 0.1, SEQ_TICK = 50;

function _seqSchedule() {
  const ctx = getCtx();
  const stepSecs = 60 / STATE.bpm / 4;
  while (_seqNextTime < ctx.currentTime + SEQ_LOOKAHEAD) {
    const s = _seqStep, t = _seqNextTime;
    for (let i = 0; i < SLOTS.length; i++) {
      if (SLOTS[i].pattern[s]) playSlot(SLOTS[i], t);
    }
    const uiDelay = Math.max(0, (t - ctx.currentTime) * 1000);
    setTimeout(() => updatePlayhead(s), uiDelay);
    _seqNextTime += stepSecs;
    _seqStep = (_seqStep + 1) % STATE.beatCount;
  }
  _seqTimer = setTimeout(_seqSchedule, SEQ_TICK);
}

function startSequencer() {
  const ctx = getCtx();
  _seqStep = 0;
  _seqNextTime = ctx.currentTime + 0.05;
  _seqSchedule();
}

function stopSequencer() {
  clearTimeout(_seqTimer);
  _seqTimer = null;
  updatePlayhead(-1);
}

function updatePlayhead(step) {
  document.querySelectorAll('.playhead-cell').forEach((el, i) => {
    el.classList.toggle('active', i === step);
  });
  SLOTS.forEach((slot, i) => {
    if (step >= 0 && slot.pattern[step]) {
      const pad = document.getElementById(`pad-${i}-${step}`);
      if (pad) { pad.classList.add('playing'); setTimeout(() => pad.classList.remove('playing'), 80); }
    }
  });
}

// =====================
// === SEQUENCER UI ===
// =====================
function renderSequencer() {
  const seq = document.getElementById('sequencer');
  seq.innerHTML = '';
  SLOTS.forEach((slot, i) => seq.appendChild(buildSlotWrapper(slot, i)));
  updateAddRowBar();
  buildTapButtons();
}

function buildSlotWrapper(slot, i) {
  const wrapper = document.createElement('div');
  wrapper.className = 'seq-slot-wrapper';
  wrapper.id = `slot-wrapper-${i}`;
  wrapper.appendChild(buildSeqRow(slot, i));
  wrapper.appendChild(buildInstPicker(slot, i));
  return wrapper;
}

function buildSeqRow(slot, i) {
  const meta = INST_META[slot.instrument];
  const row = document.createElement('div');
  row.className = 'seq-row';

  // Label cell
  const cell = document.createElement('div');
  cell.className = `seq-label-cell ${meta.cssClass}`;
  cell.style.color = meta.color;
  cell.style.background = meta.color + '14';
  cell.setAttribute('role', 'button');
  cell.setAttribute('aria-label', `${meta.label} — tap to change instrument`);
  cell.onclick = () => togglePicker(i);

  const text = document.createElement('div');
  text.className = 'seq-label-text';
  text.textContent = meta.short;
  cell.appendChild(text);

  if (slot.instrument === 'keys') {
    const sub = document.createElement('div');
    sub.className = 'seq-label-sub';
    const octLabel = slot.octave.charAt(0).toUpperCase() + slot.octave.slice(1);
    sub.textContent = `${slot.note}·${octLabel}`;
    cell.appendChild(sub);
  }

  const rmBtn = document.createElement('button');
  rmBtn.className = 'seq-remove-btn';
  rmBtn.textContent = '✕';
  rmBtn.setAttribute('aria-label', 'Remove row');
  rmBtn.style.display = SLOTS.length === 1 ? 'none' : '';
  rmBtn.onclick = (e) => { e.stopPropagation(); removeSlot(i); };
  cell.appendChild(rmBtn);

  row.appendChild(cell);

  for (let col = 0; col < STATE.beatCount; col++) {
    const pad = document.createElement('button');
    const isDownbeat = col % 4 === 0;
    pad.className = `pad ${meta.cssClass}${isDownbeat ? ' downbeat' : ''}${slot.pattern[col] ? ' active' : ''}`;
    pad.id = `pad-${i}-${col}`;
    pad.setAttribute('aria-label', `Step ${col + 1}`);
    pad.onclick = () => togglePad(i, col);
    row.appendChild(pad);
    if ((col + 1) % 4 === 0 && col < STATE.beatCount - 1) {
      row.appendChild(document.createElement('div'));
    }
  }

  return row;
}

function buildInstPicker(slot, i) {
  const picker = document.createElement('div');
  picker.className = 'inst-picker';
  picker.id = `picker-${i}`;

  const inner = document.createElement('div');
  inner.className = 'inst-picker-inner';

  // Instrument choice row
  const choiceRow = document.createElement('div');
  choiceRow.className = 'inst-choice-row';

  Object.entries(INST_META).forEach(([key, meta]) => {
    const btn = document.createElement('button');
    btn.className = `inst-choice-btn${slot.instrument === key ? ' selected' : ''}`;
    btn.style.color = meta.color;
    if (slot.instrument === key) btn.style.borderColor = meta.color;
    btn.innerHTML = `<span class="ic-emoji">${meta.emoji}</span><span class="ic-name">${meta.short}</span>`;
    btn.onclick = () => setSlotInstrument(i, key);
    choiceRow.appendChild(btn);
  });
  inner.appendChild(choiceRow);

  // Keys config (only visible when keys is selected)
  const keysConfig = document.createElement('div');
  keysConfig.className = `keys-config${slot.instrument === 'keys' ? ' show' : ''}`;
  keysConfig.id = `keys-config-${i}`;

  const keysInner = document.createElement('div');
  keysInner.className = 'keys-config-inner';

  // Note row
  const noteRow = document.createElement('div');
  noteRow.className = 'keys-config-row';
  const noteLabel = document.createElement('span');
  noteLabel.className = 'keys-config-label';
  noteLabel.textContent = 'Note';
  noteRow.appendChild(noteLabel);
  NOTES.forEach(n => {
    const btn = document.createElement('button');
    btn.className = `note-btn${slot.note === n ? ' selected' : ''}`;
    btn.textContent = n;
    btn.onclick = () => setSlotNote(i, n);
    noteRow.appendChild(btn);
  });
  keysInner.appendChild(noteRow);

  // Octave row
  const octRow = document.createElement('div');
  octRow.className = 'keys-config-row';
  const octLabel = document.createElement('span');
  octLabel.className = 'keys-config-label';
  octLabel.textContent = 'Octave';
  octRow.appendChild(octLabel);
  OCTAVES.forEach(o => {
    const btn = document.createElement('button');
    btn.className = `octave-btn${slot.octave === o ? ' selected' : ''}`;
    btn.textContent = o.charAt(0).toUpperCase() + o.slice(1);
    btn.onclick = () => setSlotOctave(i, o);
    octRow.appendChild(btn);
  });
  keysInner.appendChild(octRow);

  keysConfig.appendChild(keysInner);
  inner.appendChild(keysConfig);
  picker.appendChild(inner);
  return picker;
}

// =====================
// === PICKER OPEN/CLOSE ===
// =====================
function togglePicker(i) {
  const isOpen = openPickerIndex === i;
  closeAllPickers();
  if (!isOpen) openPicker(i);
}

function openPicker(i) {
  openPickerIndex = i;
  const picker = document.getElementById(`picker-${i}`);
  if (picker) picker.classList.add('open');
  const cell = document.querySelector(`#slot-wrapper-${i} .seq-label-cell`);
  if (cell) { cell.classList.add('open'); cell.style.borderColor = INST_META[SLOTS[i].instrument].color; }
}

function closeAllPickers() {
  document.querySelectorAll('.inst-picker.open').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.seq-label-cell.open').forEach(c => { c.classList.remove('open'); c.style.borderColor = 'transparent'; });
  openPickerIndex = -1;
}

// =====================
// === SLOT MANAGEMENT ===
// =====================
function addSlot() {
  if (SLOTS.length >= 12) return;
  closeAllPickers();
  SLOTS.push(makeSlot('kick'));
  const seq = document.getElementById('sequencer');
  const newWrapper = buildSlotWrapper(SLOTS[SLOTS.length - 1], SLOTS.length - 1);
  newWrapper.classList.add('slot-appearing');
  seq.appendChild(newWrapper);
  updateAddRowBar();
  updateRemoveButtons();
  buildTapButtons();
}

function removeSlot(i) {
  if (SLOTS.length <= 1) return;
  closeAllPickers();
  const wrapper = document.getElementById(`slot-wrapper-${i}`);
  if (!wrapper) return;
  wrapper.style.animation = 'slotRemove 0.2s ease forwards';
  wrapper.style.overflow = 'hidden';
  setTimeout(() => {
    SLOTS.splice(i, 1);
    renderSequencer();
  }, 200);
}

function setSlotInstrument(i, instrument) {
  closeAllPickers();
  SLOTS[i].instrument = instrument;
  if (instrument === 'keys') {
    if (!SLOTS[i].note) SLOTS[i].note = 'C';
    if (!SLOTS[i].octave) SLOTS[i].octave = 'mid';
  }
  const wrapper = document.getElementById(`slot-wrapper-${i}`);
  if (!wrapper) return;
  const newWrapper = buildSlotWrapper(SLOTS[i], i);
  wrapper.replaceWith(newWrapper);
  // Re-open picker on the rebuilt wrapper
  openPicker(i);
  // Audio preview (only if ctx is already running)
  const ctx = getCtx();
  if (ctx.state === 'running') triggerSound(i);
  buildTapButtons();
}

function setSlotNote(i, note) {
  SLOTS[i].note = note;
  refreshSlotLabel(i);
  refreshPickerNoteButtons(i);
  const ctx = getCtx();
  if (ctx.state === 'running') triggerSound(i);
}

function setSlotOctave(i, octave) {
  SLOTS[i].octave = octave;
  refreshSlotLabel(i);
  refreshPickerOctaveButtons(i);
  const ctx = getCtx();
  if (ctx.state === 'running') triggerSound(i);
}

function refreshSlotLabel(i) {
  const sub = document.querySelector(`#slot-wrapper-${i} .seq-label-sub`);
  if (sub) {
    const oct = SLOTS[i].octave;
    sub.textContent = `${SLOTS[i].note}·${oct.charAt(0).toUpperCase() + oct.slice(1)}`;
  }
}

function refreshPickerNoteButtons(i) {
  const config = document.getElementById(`keys-config-${i}`);
  if (!config) return;
  config.querySelectorAll('.note-btn').forEach((btn, idx) => {
    btn.classList.toggle('selected', NOTES[idx] === SLOTS[i].note);
  });
}

function refreshPickerOctaveButtons(i) {
  const config = document.getElementById(`keys-config-${i}`);
  if (!config) return;
  config.querySelectorAll('.octave-btn').forEach((btn, idx) => {
    btn.classList.toggle('selected', OCTAVES[idx] === SLOTS[i].octave);
  });
}

function updateAddRowBar() {
  const btn = document.getElementById('add-row-btn');
  const badge = document.getElementById('row-count-badge');
  if (btn) btn.style.display = SLOTS.length >= 12 ? 'none' : '';
  if (badge) {
    badge.innerHTML = `<span>${SLOTS.length}</span> / 12 rows`;
    badge.classList.toggle('at-max', SLOTS.length === 12);
  }
}

function updateRemoveButtons() {
  document.querySelectorAll('.seq-remove-btn').forEach(btn => {
    btn.style.display = SLOTS.length === 1 ? 'none' : '';
  });
}

// =====================
// === BEAT COUNT ===
// =====================
function rebuildBeatHeader() {
  const n = STATE.beatCount;
  const numGroups = n / 4;

  const bnr = document.getElementById('beat-number-row');
  bnr.innerHTML = '';
  bnr.appendChild(document.createElement('div'));
  for (let g = 0; g < numGroups; g++) {
    const num = document.createElement('div');
    num.className = 'beat-num downbeat';
    num.textContent = g + 1;
    bnr.appendChild(num);
    for (let p = 1; p < 4; p++) {
      const d = document.createElement('div');
      d.className = 'beat-num';
      bnr.appendChild(d);
    }
    if (g < numGroups - 1) bnr.appendChild(document.createElement('div'));
  }

  const pr = document.getElementById('playhead-row');
  pr.innerHTML = '';
  pr.appendChild(document.createElement('div'));
  for (let g = 0; g < numGroups; g++) {
    for (let p = 0; p < 4; p++) {
      const cell = document.createElement('div');
      cell.className = 'playhead-cell';
      cell.id = `ph-${g * 4 + p}`;
      pr.appendChild(cell);
    }
    if (g < numGroups - 1) pr.appendChild(document.createElement('div'));
  }

  const bm = document.getElementById('beat-marker');
  bm.innerHTML = '';
  bm.appendChild(document.createElement('div'));
  for (let g = 0; g < numGroups; g++) {
    const isBarStart = g === 0 || (n === 32 && g === 4);
    for (let p = 0; p < 4; p++) {
      const item = document.createElement('div');
      item.className = 'beat-marker-item' + (p === 0 ? ' ' + (isBarStart ? 'bar-start' : 'beat-start') : '');
      bm.appendChild(item);
    }
    if (g < numGroups - 1) bm.appendChild(document.createElement('div'));
  }
}

function changeBeatCount(n) {
  if (STATE.beatCount === n) return;
  if (STATE.isPlaying) {
    stopSequencer();
    STATE.isPlaying = false;
    document.getElementById('btn-play').textContent = '▶ Play Beat';
    document.getElementById('btn-play').classList.remove('playing');
    document.getElementById('swanky-root').classList.remove('playing-pulse');
  }
  STATE.beatCount = n;
  SLOTS.forEach(s => {
    if (n > s.pattern.length) {
      while (s.pattern.length < n) s.pattern.push(false);
    } else {
      s.pattern.length = n;
    }
  });
  const beatLab = document.querySelector('.beat-lab');
  beatLab.classList.remove('beats-8', 'beats-32');
  if (n === 8) beatLab.classList.add('beats-8');
  if (n === 32) beatLab.classList.add('beats-32');
  // Mobile: signal scroll wrapper that 32-beat mode is active
  const scrollOuter = document.getElementById('seq-scroll-outer');
  if (scrollOuter) scrollOuter.classList.toggle('beats-32-active', n === 32);
  document.querySelectorAll('.beat-count-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.beats) === n);
  });
  rebuildBeatHeader();
  renderSequencer();
  document.getElementById('grade-panel').classList.remove('show');
}

function downsampleTo8(prob16) {
  return [0, 2, 4, 6, 8, 10, 12, 14].map(i => prob16[i] || 0);
}

function upsampleTo32(prob16) {
  return [...prob16, ...prob16];
}

      { instrument:'keys',  note:'B', octave:'mid',  prob:[0,0,0.35,0, 0,0,0,0.3, 0,0,0.3,0, 0,0,0,0.25] },
    ]
  },
};

let _swankyPressCount = 0;

function generatePattern(probMap) {
  return probMap.map(p => Math.random() < p);
}

function buildGenreSlots(key) {
  const tmpl = GENRE_TEMPLATES[key];
  let baseDefs = tmpl.slots;
  if (key === 'swanky') {
    const count = 10 + Math.floor(Math.random() * 3);
    baseDefs = [...baseDefs].sort(() => Math.random() - 0.5).slice(0, count);
  }
  const defs = baseDefs.map(s => {
    let prob;
    if (STATE.beatCount === 8) {
      prob = (tmpl.slots8 ? tmpl.slots8.find(d => d.instrument === s.instrument && d.note === s.note)?.prob : null)
             || downsampleTo8(s.prob);
    } else if (STATE.beatCount === 32) {
      prob = upsampleTo32(s.prob);
    } else {
      prob = s.prob;
    }
    return { ...s, prob };
  });
  return defs.map(s => {
    const slot = makeSlot(s.instrument, s.note, s.octave);
    slot.pattern = generatePattern(s.prob);
    return slot;
  });
}

function applyGenre(key) {
  const tmpl = GENRE_TEMPLATES[key];
  if (!tmpl) return;
  closeGenrePicker();
  if (STATE.isPlaying) {
    stopSequencer();
    STATE.isPlaying = false;
    document.getElementById('btn-play').textContent = '▶ Play Beat';
    document.getElementById('btn-play').classList.remove('playing');
    document.getElementById('swanky-root').classList.remove('playing-pulse');
  }
  SLOTS = buildGenreSlots(key);
  STATE.bpm = tmpl.bpm;
  const bpmRange = document.getElementById('bpm-range');
  if (bpmRange) bpmRange.value = tmpl.bpm;
  document.getElementById('bpm-display').textContent = tmpl.bpm;
  renderSequencer();
  document.getElementById('grade-panel').classList.remove('show');
  const dance = GENRE_DANCE_MAP[key] || 'idle';
  _ambientDance = dance;
  startDance(dance);
  if (key === 'swanky') {
    setSpeak('I regret nothing!! 🧀🔥');
    showToast('🧀 SWANKY MODE ACTIVATED!');
  } else {
    setSpeak(`${tmpl.name} vibes! Let's get cheesy! 🎵`);
    showToast(`${tmpl.emoji} ${tmpl.name} loaded!`);
  }
}

function surpriseMe() {
  _swankyPressCount++;
  const keys = Object.keys(GENRE_TEMPLATES);
  let key;
  if (_swankyPressCount % 5 === 0 && Math.random() < 0.5) {
    key = 'swanky';
  } else {
    const nonSwanky = keys.filter(k => k !== 'swanky');
    key = nonSwanky[Math.floor(Math.random() * nonSwanky.length)];
  }
  applyGenre(key);
}

let tapTimer = null;
let tapInterval = null;

function buildTapButtons() {
  const tapArea = document.getElementById('tap-area');
  // Remove all buttons except the progress bar
  Array.from(tapArea.children).forEach(child => {
    if (!child.classList.contains('tap-progress')) child.remove();
  });

  const uniqueInstruments = [...new Set(SLOTS.map(s => s.instrument))];
  const progress = tapArea.querySelector('.tap-progress');

  uniqueInstruments.forEach(inst => {
    const meta = INST_META[inst];
    const btn = document.createElement('button');
    btn.className = 'tap-btn';
    btn.style.background = meta.color;
    btn.style.color = (inst === 'snare' || inst === 'hihat') ? '#1A1A1A' : 'white';
    btn.innerHTML = `${meta.label} ${meta.emoji}`;
    btn.setAttribute('data-instrument', inst);
    btn.addEventListener('pointerdown', () => tapInstrument(inst));
    tapArea.insertBefore(btn, progress);
  });
}

async function tapInstrument(instrument) {
  await unlockAudio();
  if (!STATE.tapRecording) startTapRecording();

  const slotIdx = SLOTS.findIndex(s => s.instrument === instrument);
  if (slotIdx === -1) return;

  const elapsed = Date.now() - STATE.tapStartTime;
  const stepDuration = (60000 / STATE.bpm) / 4;
  const nearestStep = Math.round(elapsed / stepDuration) % STATE.beatCount;

  triggerSound(slotIdx);
  if (nearestStep >= 0 && nearestStep < STATE.beatCount) {
    SLOTS[slotIdx].pattern[nearestStep] = true;
    const pad = document.getElementById(`pad-${slotIdx}-${nearestStep}`);
    if (pad) pad.classList.add('active');
  }
}

function startTapRecording() {
  STATE.tapRecording = true;
  STATE.tapStartTime = Date.now();
  SLOTS.forEach(s => s.pattern.fill(false));
  // Clear pad visuals without full rebuild
  document.querySelectorAll('.pad.active').forEach(p => p.classList.remove('active'));
  document.getElementById('grade-panel').classList.remove('show');

  const fill = document.getElementById('tap-progress-fill');
  fill.style.width = '0%';
  tapInterval = setInterval(() => {
    const pct = Math.min(100, ((Date.now() - STATE.tapStartTime) / STATE.tapDuration) * 100);
    fill.style.width = pct + '%';
  }, 100);
  tapTimer = setTimeout(() => {
    STATE.tapRecording = false;
    clearInterval(tapInterval);
    fill.style.width = '100%';
    setSpeak("Ooh, I felt that rhythm! 🎵");
    setTimeout(() => { fill.style.width = '0%'; }, 500);
  }, STATE.tapDuration);
}

const GRADE_MESSAGES = {
  S: "AGED TO PERFECTION!! 🧀✨",
  A: "That's some sharp cheddar right there!",
  B: "Solid! A little more funk and you're golden.",
  C: "Not bad! Try spicing up those hi-hats.",
  D: "Even I started somewhere. Check the hint! 👇"
};

const HINTS = {
  density_low:  "Try filling in more beats — your grid is looking a bit empty!",
  density_high: "Whoa, too many notes! Leave some breathing room in your beat.",
  variety:      "Mix it up! Try using more instrument types for a fuller sound.",
  syncopation:  "Spice it up! Try hitting some pads on the off-beats.",
  anchor:       "Pro tip: Put a Kick on step 1 and a Snare on step 5 or 9 for a solid groove.",
  harmonic:     "Add some Keys rows and vary the notes for harmonic depth!",
  perfect:      "You're nailing it! Keep experimenting with different patterns! 🔥",
};

async function gradeBeat() {
  await unlockAudio();
  const allActive = SLOTS.flatMap(s => s.pattern).filter(Boolean);
  if (allActive.length < 2) { setSpeak("Add some more beats first, fam! 🎹"); return; }

  const totalPads = SLOTS.length * STATE.beatCount;
  const filled = allActive.length;
  const density = filled / totalPads;

  // 1. Density (30)
  const densityScore = density < 0.15 ? 10 : density < 0.3 ? 20 : density <= 0.55 ? 30 : density <= 0.75 ? 20 : 10;

  // 2. Variety (25) — distinct instrument types with ≥1 active pad
  const activeTypes = new Set(SLOTS.filter(s => s.pattern.some(Boolean)).map(s => s.instrument));
  const varietyScore = Math.min(25, activeTypes.size * 5);

  // 3. Syncopation (20) — off-beats scaled to beatCount
  const offBeats = [];
  for (let i = 0; i < STATE.beatCount; i++) {
    const mod = i % 8;
    if (mod === 2 || mod === 4 || mod === 6) offBeats.push(i);
  }
  let offCount = 0;
  SLOTS.forEach(s => offBeats.forEach(step => { if (s.pattern[step]) offCount++; }));
  const syncoScore = Math.min(20, Math.floor((offCount / Math.max(1, SLOTS.length * offBeats.length)) * 40));

  // 4. Rhythm Anchor (15) — scan by instrument type, not index
  const kickSlots  = SLOTS.filter(s => s.instrument === 'kick');
  const snareSlots = SLOTS.filter(s => s.instrument === 'snare');
  let anchorScore = 0;
  if (kickSlots.some(s => s.pattern[0]))                    anchorScore += 8;
  if (snareSlots.some(s => s.pattern[4] || s.pattern[8]))   anchorScore += 7;

  // 5. Harmonic Depth (20)
  const keysSlots = SLOTS.filter(s => s.instrument === 'keys' && s.pattern.some(Boolean));
  const distinctPitches = new Set(keysSlots.map(s => `${s.note}${OCTAVE_NUM[s.octave]}`));
  let harmonicScore = 0;
  if (keysSlots.length >= 1)     harmonicScore += 8;
  if (distinctPitches.size >= 2) harmonicScore += 7;
  if (distinctPitches.size >= 3) harmonicScore += 5;

  // 6. Slot Exploration (10)
  const exploScore = SLOTS.length >= 10 ? 10 : SLOTS.length >= 7 ? 5 : 0;

  const total = densityScore + varietyScore + syncoScore + anchorScore + harmonicScore + exploScore;

  let grade;
  if (total >= 90) grade = 'S';
  else if (total >= 75) grade = 'A';
  else if (total >= 55) grade = 'B';
  else if (total >= 35) grade = 'C';
  else grade = 'D';

  const pointsMap = { S:100, A:75, B:50, C:25, D:10 };
  let pts = pointsMap[grade];
  if (['S','A','B'].includes(grade)) {
    STATE.streak++;
    if (STATE.streak >= 3) { pts += 25; showToast('+25 Streak Bonus! 🔥'); }
  } else {
    STATE.streak = 0;
  }

  STATE.points += pts;
  STATE.level = Math.floor(STATE.points / 200) + 1;
  STATE.gradeHistory.push(grade);
  updateStats();

  const panel = document.getElementById('grade-panel');
  panel.classList.add('show');

  const gradeClasses = {S:'grade-s',A:'grade-a',B:'grade-b',C:'grade-c',D:'grade-d'};
  document.getElementById('grade-letter').textContent = grade;
  document.getElementById('grade-letter').className = 'grade-letter ' + gradeClasses[grade];
  document.getElementById('grade-message').textContent = GRADE_MESSAGES[grade];
  document.getElementById('grade-points-earned').textContent = `+${pts} points earned`;

  const bars = [
    { label: 'Density',   val: densityScore,  max: 30 },
    { label: 'Variety',   val: varietyScore,  max: 25 },
    { label: 'Syncopation', val: syncoScore,  max: 20 },
    { label: 'Rhythm',    val: anchorScore,   max: 15 },
    { label: '🎹 Harmonic', val: harmonicScore, max: 20 },
    { label: '🎛️ Slots',   val: exploScore,   max: 10 },
  ];
  document.getElementById('score-bars').innerHTML = bars.map(b => `
    <div class="score-bar-row">
      <span class="score-bar-label">${b.label}</span>
      <div class="score-bar-track">
        <div class="score-bar-fill" style="width:0%" data-pct="${Math.round(b.val/b.max*100)}"></div>
      </div>
      <span class="score-bar-val">${b.val}/${b.max}</span>
    </div>
  `).join('');
  setTimeout(() => {
    document.querySelectorAll('.score-bar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 50);

  let hint = HINTS.perfect;
  if (densityScore < 20 && density < 0.3)  hint = HINTS.density_low;
  else if (densityScore < 20 && density > 0.55) hint = HINTS.density_high;
  else if (varietyScore < 15)               hint = HINTS.variety;
  else if (syncoScore < 10)                 hint = HINTS.syncopation;
  else if (anchorScore < 8)                 hint = HINTS.anchor;
  else if (harmonicScore < 8)               hint = HINTS.harmonic;
  document.getElementById('grade-hint').innerHTML = `<strong>💡 Tip:</strong> ${hint}`;

  playGradeReaction(grade);

  setSpeak(GRADE_MESSAGES[grade]);
  playGradeSound(grade);
  showToast(`${grade} Grade! +${pts} pts`);
}

function playGradeSound(grade) {
  const ctx = getCtx();
  if (ctx.state !== 'running') return;
  const now = ctx.currentTime + 0.01;
  const seq = grade === 'S' ? [['C4',0],['E4',.1],['G4',.2],['C5',.3]] :
              grade === 'A' ? [['C4',0],['E4',.1],['G4',.2]] :
              grade === 'B' ? [['E4',0]] :
              grade === 'C' ? [['C4',0]] : [['E4',0],['C4',.15]];
  seq.forEach(([n,dt]) => playMelodyNote(n, now + dt));
}

function renderWardrobe() {
  const activeTier = window._activeTier || 1;
  const activeSlot = window._activeWardrobeSlot || 'all';
  document.getElementById('tier-nav').innerHTML = TIERS.map(t => {
    const unlocked = STATE.level >= t.levelReq;
    const isActive = activeTier === t.id;
    const onclick = unlocked ? 'selectTier('+t.id+')' : 'showToast("Reach Level '+t.levelReq+' to unlock!")';
    return '<button class="tier-pill tier-'+t.id+'-pill '+(isActive?'active':'')+' '+(unlocked?'':'locked')+'" onclick="'+onclick+'">'
      +'<span class="tp-num">'+t.label+'</span>'
      +'<span class="tp-name">'+t.name+'</span>'
      +'<span class="tp-req">Lv.'+t.levelReq+'+</span>'
      +'</button>';
  }).join('');
  const tier = TIERS.find(t => t.id === activeTier);
  if (STATE.level < tier.levelReq) {
    document.getElementById('slot-tabs').innerHTML = '';
    document.getElementById('items-grid').innerHTML =
      '<div class="tier-locked-notice"><span class="lock-emoji">🔒</span>'
      +tier.name+' is locked!<div class="lock-detail">Reach Level '+tier.levelReq
      +' to unlock · You are Level '+STATE.level+'</div></div>';
    return;
  }
  const slotLabels = {all:'All',eyes:'Eyes',feet:'Shoes',head:'Hats',hands:'Gloves',body:'Chains',gear:'Gear',mouth:'Grillz'};
  const tierSlots = [...new Set(ITEMS.filter(i => i.tier === activeTier).map(i => i.slot))];
  document.getElementById('slot-tabs').innerHTML = ['all',...tierSlots].map(s =>
    '<button class="slot-tab '+(s===activeSlot?'active':'')+'" onclick="filterWardrobe(\''+s+'\')">'+(slotLabels[s]||s)+'</button>'
  ).join('');
  const tierItems = ITEMS.filter(i => i.tier === activeTier);
  const items = activeSlot === 'all' ? tierItems : tierItems.filter(i => i.slot === activeSlot);
  document.getElementById('items-grid').innerHTML = items.length === 0
    ? '<div style="grid-column:1/-1;text-align:center;opacity:.5;font-size:.7rem;padding:20px;">Nothing here yet</div>'
    : items.map(item => {
        const owned = STATE.unlockedItems.has(item.id) || STATE.points >= item.cost;
        const equipped = STATE.equippedItems[item.slot] === item.id;
        const cls = equipped ? 'item-card equipped unlocked' : owned ? 'item-card unlocked' : 'item-card locked';
        return '<div class="'+cls+'" onclick="toggleEquip(\''+item.id+'\')">'
          +(equipped ? '<div class="equipped-badge">ON</div>' : '')
          +'<div class="item-emoji">'+item.emoji+'</div>'
          +'<div class="item-name">'+item.name+'</div>'
          +'<div class="item-cost '+(owned?'owned':'')+'">'+(owned?'✓ Owned':item.cost+' pts')+'</div>'
          +'</div>';
      }).join('');
}

function selectTier(id) {
  window._activeTier = id;
  window._activeWardrobeSlot = 'all';
  renderWardrobe();
}

function filterWardrobe(slot) {
  window._activeWardrobeSlot = slot;
  renderWardrobe();
}

function toggleEquip(itemId) {
  const item = ITEMS.find(i => i.id === itemId);
  if (!item) return;
  const tier = TIERS.find(t => t.id === item.tier);
  if (STATE.level < tier.levelReq) { setSpeak('Reach Level '+tier.levelReq+' to unlock '+tier.name+'! 🔒'); return; }
  const canAfford = STATE.points >= item.cost || STATE.unlockedItems.has(item.id);
  if (!canAfford) { setSpeak("Not enough points yet! Keep making beats! 💪"); return; }
  STATE.unlockedItems.add(itemId);
  STATE.equippedItems[item.slot] = STATE.equippedItems[item.slot] === itemId ? null : itemId;
  updateSwankyCosmetics('swanky-root');
  updateSwankyCosmetics('wardrobe-swanky-root', 'w-');
  renderWardrobe();
  setSpeak("Looking SWANKY! 🧀✨");
  // strut reaction in wardrobe
  tweenPose(POSES.swagger_c, 300, easeInOut, () =>
    tweenPose(POSES.cool_idle, 400, easeInOut, null));
}

function updateSwankyCosmetics(rootId, prefix='') {
  const pfx = prefix || '';
  ['head','eyes','body','mouth','gear'].forEach(slot => {
    const el = document.getElementById(pfx+'cosmetic-'+slot);
    if (!el) return;
    const equippedId = STATE.equippedItems[slot];
    if (equippedId) {
      const item = ITEMS.find(i => i.id === equippedId);
      if (item) { el.innerHTML = item.svg; return; }
    }
    el.innerHTML = '';
  });
  ['hands','feet'].forEach(slot => {
    const el_l = document.getElementById(pfx+'cosmetic-'+slot+'-l');
    const el_r = document.getElementById(pfx+'cosmetic-'+slot+'-r');
    const equippedId = STATE.equippedItems[slot];
    const content = equippedId ? (ITEMS.find(i => i.id === equippedId)?.svg || '') : '';
    if (el_l) el_l.innerHTML = content;
    if (el_r) el_r.innerHTML = content;
  });
}

function unequipAll() {
  Object.keys(STATE.equippedItems).forEach(k => STATE.equippedItems[k] = null);
  updateSwankyCosmetics('swanky-root');
  updateSwankyCosmetics('wardrobe-swanky-root', 'w-');
  renderWardrobe();
}

// Parse a bezier d string into array of 8 numbers [M x y C cx1 cy1 cx2 cy2 ex ey]
function parseBezier(d) {
  return d.replace(/[MCmc]/g,' ').trim().split(/[\s,]+/).map(Number);
}

// Lerp two bezier d strings by t (0→1), return interpolated d string
function lerpBezier(dA, dB, t) {
  const a = parseBezier(dA), b = parseBezier(dB);
  const r = a.map((v,i) => v + (b[i]-v)*t);
  return `M ${r[0]},${r[1]} C ${r[2]},${r[3]} ${r[4]},${r[5]} ${r[6]},${r[7]}`;
}

// Lerp transform strings: "translate(x,y) rotate(deg,cx,cy)"
function lerpTransform(tA, tB, t) {
  const nums = s => s.replace(/[a-z()]/gi,' ').trim().split(/[\s,]+/).map(Number);
  const a = nums(tA), b = nums(tB);
  const r = a.map((v,i) => v + (b[i]-v)*t);
  return `translate(${r[0]},${r[1]}) rotate(${r[2]},${r[3]},${r[4]})`;
}

function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

let _danceRAF = null;
let _currentPose = POSES.idle; // live state for both SVGs
let _currentDanceName = 'idle';
let _ambientDance = 'idle'; // the looping dance to return to after a reaction

// Apply a pose object immediately to both SVGs
function applyPose(pose) {
  _currentPose = pose;
  const ids = [
    ['arm-l-out','arm-l','arm-l-hi'],
    ['arm-r-out','arm-r','arm-r-hi'],
    ['leg-l-out','leg-l','leg-l-hi'],
    ['leg-r-out','leg-r','leg-r-hi'],
  ];
  const vals = [pose.armL, pose.armR, pose.legL, pose.legR];
  ['','w-'].forEach(pfx => {
    vals.forEach((d, i) => {
      ids[i].forEach(id => {
        const el = document.getElementById(pfx+id);
        if (el) el.setAttribute('d', d);
      });
    });
    ['swanky-root','wardrobe-swanky-root'].forEach((rid, ri) => {
      const root = document.getElementById(ri === 0 ? 'swanky-root' : 'wardrobe-swanky-root');
      if (root) root.setAttribute('transform', pose.body);
    });
  });
  // also update hand/foot positions derived from limb endpoints
  _updateEndpoints(pose);
}

// Move hand-blob and foot ellipses to limb endpoints, and translate cosmetic overlays
function _updateEndpoints(pose) {
  const endpt = d => { const n = parseBezier(d); return {x:n[6],y:n[7]}; };
  const lh = endpt(pose.armL), rh = endpt(pose.armR);
  const lf = endpt(pose.legL), rf = endpt(pose.legR);
  [['hand-l',lh],['hand-r',rh]].forEach(([id,pt]) => {
    ['','w-'].forEach(pfx => {
      const el = document.getElementById(pfx+id);
      if (el) { el.setAttribute('cx', pt.x); el.setAttribute('cy', pt.y); }
    });
  });
  [['foot-l',lf],['foot-r',rf]].forEach(([id,pt]) => {
    ['','w-'].forEach(pfx => {
      const el = document.getElementById(pfx+id);
      if (el) { el.setAttribute('cx', pt.x); el.setAttribute('cy', pt.y); }
    });
  });
  ['','w-'].forEach(pfx => {
    const chl = document.getElementById(pfx+'cosmetic-hands-l');
    const chr = document.getElementById(pfx+'cosmetic-hands-r');
    const cfl = document.getElementById(pfx+'cosmetic-feet-l');
    const cfr = document.getElementById(pfx+'cosmetic-feet-r');
    if (chl) chl.setAttribute('transform', `translate(${lh.x-8},${lh.y-162})`);
    if (chr) chr.setAttribute('transform', `translate(${rh.x-152},${rh.y-162})`);
    if (cfl) cfl.setAttribute('transform', `translate(${lf.x-44},${lf.y-173})`);
    if (cfr) cfr.setAttribute('transform', `translate(${rf.x-116},${rf.y-173})`);
  });
}

// Tween from current pose to target pose over durationMs, call onDone when complete
function tweenPose(targetPose, durationMs, easeFn, onDone) {
  if (_danceRAF) cancelAnimationFrame(_danceRAF);
  const from = {..._currentPose};
  const start = performance.now();
  function tick(now) {
    let t = Math.min(1, (now - start) / durationMs);
    const e = easeFn ? easeFn(t) : t;
    const interp = {
      armL: lerpBezier(from.armL, targetPose.armL, e),
      armR: lerpBezier(from.armR, targetPose.armR, e),
      legL: lerpBezier(from.legL, targetPose.legL, e),
      legR: lerpBezier(from.legR, targetPose.legR, e),
      body: lerpTransform(from.body, targetPose.body, e),
    };
    applyPose(interp);
    if (t < 1) { _danceRAF = requestAnimationFrame(tick); }
    else { _danceRAF = null; if (onDone) onDone(); }
  }
  _danceRAF = requestAnimationFrame(tick);
}

// Loop between two poses forever (ambient dance)
function loopPoses(poseA, poseB, halfPeriodMs, easeFn) {
  function goToB() { tweenPose(poseB, halfPeriodMs, easeFn, goToA); }
  function goToA() { tweenPose(poseA, halfPeriodMs, easeFn, goToB); }
  tweenPose(poseA, halfPeriodMs, easeFn, goToB);
}

// Snap between poses with no interpolation (for techno robot)
function snapLoop(poseA, poseB, intervalMs) {
  if (_danceRAF) cancelAnimationFrame(_danceRAF);
  let on = true;
  function tick() {
    applyPose(on ? poseA : poseB);
    on = !on;
    _danceRAF = setTimeout(tick, intervalMs);
  }
  tick();
}

const DANCE_SPECS = {
  idle:      () => loopPoses(POSES.idle, {...POSES.idle, body:'translate(3,0) rotate(2,80,90)'}, 900, easeInOut),
  hiphop:    () => loopPoses(POSES.hiphop_a, POSES.hiphop_b, 400, easeInOut),
  jazz:      () => loopPoses(POSES.jazz_a, POSES.jazz_b, 700, easeInOut),
  techno:    () => snapLoop(POSES.techno_a, POSES.techno_b, 280),
  reggae:    () => loopPoses(POSES.reggae_a, POSES.reggae_b, 1100, easeInOut),
  house:     () => loopPoses(POSES.house_down, POSES.house_up, 360, easeInOut),
  bossanova: () => loopPoses(POSES.bossa_a, POSES.bossa_b, 900, easeInOut),
  shimmy:    () => loopPoses(POSES.idle, {...POSES.idle, body:'translate(3,0) rotate(2,80,90)'}, 280, easeInOut),
  cool:      () => tweenPose(POSES.cool_idle, 600, easeInOut, null),
};

const GENRE_DANCE_MAP = {
  hiphop:'hiphop', jazz:'jazz', techno:'techno', reggae:'reggae',
  house:'house', bossanova:'bossanova', eightbit:'techno',
  romance:'jazz', showtunes:'hiphop', swanky:'hiphop',
  grunge:'hiphop', disco:'house', swing:'jazz',
};

function startDance(name) {
  if (_danceRAF) { cancelAnimationFrame(_danceRAF); clearTimeout(_danceRAF); _danceRAF = null; }
  _currentDanceName = name;
  (DANCE_SPECS[name] || DANCE_SPECS.idle)();
}

function returnToAmbient() { startDance(_ambientDance); }

// Grade reaction then return to ambient
function playGradeReaction(grade) {
  if (grade === 'S') {
    tweenPose(POSES.swagger_a, 400, easeInOut, () =>
      tweenPose(POSES.swagger_b, 400, easeInOut, () =>
        tweenPose(POSES.swagger_c, 500, easeInOut, () =>
          setTimeout(returnToAmbient, 800))));
  } else if (grade === 'A') {
    tweenPose(POSES.jazz_a, 350, easeInOut, () =>
      tweenPose(POSES.jazz_b, 350, easeInOut, () =>
        tweenPose(POSES.jazz_a, 350, easeInOut, () =>
          tweenPose(POSES.jazz_b, 350, easeInOut, returnToAmbient))));
  } else if (grade === 'B') {
    tweenPose(POSES.hiphop_a, 320, easeInOut, () =>
      tweenPose(POSES.hiphop_b, 320, easeInOut, () =>
        tweenPose(POSES.hiphop_a, 320, easeInOut, returnToAmbient)));
  } else if (grade === 'C') {
    startDance('shimmy');
    setTimeout(returnToAmbient, 2000);
  } else {
    tweenPose(POSES.droop, 600, easeInOut, () => setTimeout(returnToAmbient, 2500));
  }
}

// Compatibility shim — old code calls setSwankyDance(className)
function setSwankyDance(danceClass) {
  const map = {
    'dance-idle':'idle','dance-shimmy':'shimmy','dance-slide':'jazz',
    'dance-shake':'techno','dance-bounce':'hiphop','dance-dip':'bossanova','dance-swagger':'jazz',
  };
  const name = map[danceClass] || 'idle';
  startDance(name);
  // preserve playing-pulse by checking STATE
  ['swanky-root','wardrobe-swanky-root'].forEach(id => {
    const el = document.getElementById(id);
    if (el && STATE.isPlaying) el.classList.add('playing-pulse');
    else if (el) el.classList.remove('playing-pulse');
  });
}

(function() {
  // On mobile, always show audio prompt regardless of UA (handles iPads, etc.)
  const prompt = document.getElementById('audio-prompt');
  const acceptBtn = document.getElementById('ap-accept');
  const dismissBtn = document.getElementById('ap-dismiss');
  prompt.style.display = 'flex';

  async function acceptAudio(e) {
    e.preventDefault();
    await unlockAudio();
    prompt.style.display = 'none';
    showToast('Audio enabled 🔊');
  }
  function dismissPrompt(e) {
    e.preventDefault();
    prompt.style.display = 'none';
  }

  // Use both click and touchend to ensure it fires on all mobile browsers
  acceptBtn.addEventListener('click', acceptAudio);
  acceptBtn.addEventListener('touchend', acceptAudio, { passive: false });
  dismissBtn.addEventListener('click', dismissPrompt);
  dismissBtn.addEventListener('touchend', dismissPrompt, { passive: false });
}());
