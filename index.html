<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swanky Cheese</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --green: #33ff33;
    --dark-green: #00aa00;
    --black: #0a0a0a;
    --amber: #ffb000;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--green);
    font-family: 'Press Start 2P', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    image-rendering: pixelated;
  }

  /* scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  h1 {
    font-size: clamp(14px, 4vw, 28px);
    color: var(--amber);
    text-shadow: 3px 3px 0 #7a4400, 0 0 20px #ffb000aa;
    letter-spacing: 4px;
    margin-bottom: 6px;
    text-align: center;
  }

  .subtitle {
    font-size: 8px;
    color: var(--dark-green);
    margin-bottom: 28px;
    letter-spacing: 2px;
  }

  /* ── CHEESE SELECTOR ── */
  .cheese-selector {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 30px;
  }

  .cheese-btn {
    background: var(--black);
    border: 2px solid var(--dark-green);
    color: var(--dark-green);
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.05s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .cheese-btn:hover {
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 8px var(--green);
  }

  .cheese-btn.active {
    background: var(--dark-green);
    color: var(--black);
    border-color: var(--green);
    box-shadow: 0 0 14px var(--green);
  }

  /* ── MAIN STAGE ── */
  .stage {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
    width: 100%;
    max-width: 900px;
  }

  /* ── CHEESE CANVAS ── */
  .cheese-display {
    position: relative;
    width: 260px;
    height: 280px;
    flex-shrink: 0;
  }

  .cheese-display canvas {
    display: block;
    image-rendering: pixelated;
  }

  /* ── WARDROBE PANEL ── */
  .wardrobe {
    flex: 1;
    min-width: 220px;
    max-width: 380px;
  }

  .wardrobe-section {
    margin-bottom: 20px;
  }

  .wardrobe-section h3 {
    font-size: 8px;
    color: var(--amber);
    margin-bottom: 10px;
    border-bottom: 1px solid var(--dark-green);
    padding-bottom: 6px;
    letter-spacing: 2px;
  }

  .attire-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .attire-btn {
    background: var(--black);
    border: 2px solid #1a4a1a;
    color: #1a6a1a;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 7px 10px;
    cursor: pointer;
    transition: all 0.05s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    line-height: 1.4;
  }

  .attire-btn:hover {
    border-color: var(--dark-green);
    color: var(--dark-green);
  }

  .attire-btn.active {
    background: #001a00;
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 8px #33ff3366;
  }

  .attire-btn .emoji {
    display: block;
    font-size: 16px;
    margin-bottom: 4px;
    text-align: center;
  }

  /* ── BLINK ── */
  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  .cursor {
    display: inline-block;
    animation: blink 1s step-end infinite;
  }

  /* ── PIXEL BORDER ── */
  .pixel-box {
    border: 3px solid var(--dark-green);
    box-shadow: inset 0 0 0 1px var(--black), 0 0 0 1px var(--dark-green);
    padding: 16px;
  }

  .no-cheese-msg {
    font-size: 8px;
    color: var(--dark-green);
    text-align: center;
    padding: 60px 20px;
    line-height: 2.2;
  }

  footer {
    margin-top: 40px;
    font-size: 7px;
    color: #1a4a1a;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<h1>SWANKY CHEESE</h1>
<p class="subtitle">&gt; SELECT YOUR CHEESE<span class="cursor">_</span></p>

<div class="cheese-selector">
  <button class="cheese-btn" data-cheese="cheddar">CHEDDAR</button>
  <button class="cheese-btn" data-cheese="swiss">SWISS</button>
  <button class="cheese-btn" data-cheese="gouda">GOUDA</button>
  <button class="cheese-btn" data-cheese="brie">BRIE</button>
</div>

<div class="stage">
  <div class="cheese-display pixel-box">
    <canvas id="cheeseCanvas" width="228" height="248"></canvas>
  </div>

  <div class="wardrobe pixel-box" id="wardrobe">
    <div class="no-cheese-msg" id="wardrobePrompt">
      &gt; PICK A CHEESE FIRST<br>TO UNLOCK THE DRIP
    </div>
    <div id="wardrobeContent" style="display:none">
      <div class="wardrobe-section">
        <h3>[ HATS ]</h3>
        <div class="attire-grid" id="hats">
          <button class="attire-btn" data-slot="hat" data-item="none"><span class="emoji">🚫</span>NONE</button>
          <button class="attire-btn" data-slot="hat" data-item="tophat"><span class="emoji">🎩</span>TOP HAT</button>
          <button class="attire-btn" data-slot="hat" data-item="cowboy"><span class="emoji">🤠</span>COWBOY</button>
          <button class="attire-btn" data-slot="hat" data-item="crown"><span class="emoji">👑</span>CROWN</button>
          <button class="attire-btn" data-slot="hat" data-item="beret"><span class="emoji">🎭</span>BERET</button>
          <button class="attire-btn" data-slot="hat" data-item="hardhat"><span class="emoji">⛑️</span>HARD HAT</button>
        </div>
      </div>
      <div class="wardrobe-section">
        <h3>[ SHADES ]</h3>
        <div class="attire-grid" id="shades">
          <button class="attire-btn" data-slot="shades" data-item="none"><span class="emoji">🚫</span>NONE</button>
          <button class="attire-btn" data-slot="shades" data-item="aviator"><span class="emoji">🕶️</span>AVIATOR</button>
          <button class="attire-btn" data-slot="shades" data-item="heart"><span class="emoji">🩷</span>HEART</button>
          <button class="attire-btn" data-slot="shades" data-item="monocle"><span class="emoji">🧐</span>MONOCLE</button>
          <button class="attire-btn" data-slot="shades" data-item="vr"><span class="emoji">🥽</span>VR GOGGLES</button>
        </div>
      </div>
      <div class="wardrobe-section">
        <h3>[ CHAINS ]</h3>
        <div class="attire-grid" id="chains">
          <button class="attire-btn" data-slot="chain" data-item="none"><span class="emoji">🚫</span>NONE</button>
          <button class="attire-btn" data-slot="chain" data-item="gold"><span class="emoji">📿</span>GOLD</button>
          <button class="attire-btn" data-slot="chain" data-item="diamond"><span class="emoji">💎</span>DIAMOND</button>
          <button class="attire-btn" data-slot="chain" data-item="pearl"><span class="emoji">🪮</span>PEARL</button>
        </div>
      </div>
      <div class="wardrobe-section">
        <h3>[ KICKS ]</h3>
        <div class="attire-grid" id="kicks">
          <button class="attire-btn" data-slot="shoes" data-item="none"><span class="emoji">🚫</span>NONE</button>
          <button class="attire-btn" data-slot="shoes" data-item="sneakers"><span class="emoji">👟</span>SNEAKERS</button>
          <button class="attire-btn" data-slot="shoes" data-item="boots"><span class="emoji">🥾</span>BOOTS</button>
          <button class="attire-btn" data-slot="shoes" data-item="heels"><span class="emoji">👠</span>HEELS</button>
          <button class="attire-btn" data-slot="shoes" data-item="crocs"><span class="emoji">🐊</span>CROCS</button>
        </div>
      </div>
      <div class="wardrobe-section">
        <h3>[ JACKET ]</h3>
        <div class="attire-grid" id="jackets">
          <button class="attire-btn" data-slot="jacket" data-item="none"><span class="emoji">🚫</span>NONE</button>
          <button class="attire-btn" data-slot="jacket" data-item="leather"><span class="emoji">🧥</span>LEATHER</button>
          <button class="attire-btn" data-slot="jacket" data-item="tuxedo"><span class="emoji">🤵</span>TUXEDO</button>
          <button class="attire-btn" data-slot="jacket" data-item="tracksuit"><span class="emoji">🏃</span>TRACKSUIT</button>
          <button class="attire-btn" data-slot="jacket" data-item="cape"><span class="emoji">🦸</span>CAPE</button>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>&copy; 2026 SWANKY CHEESE CORP &mdash; ALL RIGHTS RESERVED</footer>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
const state = {
  cheese: null,
  hat: 'none',
  shades: 'none',
  chain: 'none',
  shoes: 'none',
  jacket: 'none',
};

const canvas = document.getElementById('cheeseCanvas');
const ctx = canvas.getContext('2d');

// ── PIXEL SCALE ─────────────────────────────────────────────────────────────
const S = 4; // 1 "pixel" = 4 canvas pixels

function px(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * S, y * S, w * S, h * S);
}

// ── CHEESE SHAPES ───────────────────────────────────────────────────────────
function drawCheddar() {
  // Body: chunky orange wedge
  const body = [
    [4,14],[5,14],[6,14],[7,14],[8,14],[9,14],[10,14],[11,14],[12,14],[13,14],
    [3,15],[4,15],[5,15],[6,15],[7,15],[8,15],[9,15],[10,15],[11,15],[12,15],[13,15],[14,15],
    [3,16],[4,16],[5,16],[6,16],[7,16],[8,16],[9,16],[10,16],[11,16],[12,16],[13,16],[14,16],
    [2,17],[3,17],[4,17],[5,17],[6,17],[7,17],[8,17],[9,17],[10,17],[11,17],[12,17],[13,17],[14,17],[15,17],
    [2,18],[3,18],[4,18],[5,18],[6,18],[7,18],[8,18],[9,18],[10,18],[11,18],[12,18],[13,18],[14,18],[15,18],
    [1,19],[2,19],[3,19],[4,19],[5,19],[6,19],[7,19],[8,19],[9,19],[10,19],[11,19],[12,19],[13,19],[14,19],[15,19],[16,19],
    [1,20],[2,20],[3,20],[4,20],[5,20],[6,20],[7,20],[8,20],[9,20],[10,20],[11,20],[12,20],[13,20],[14,20],[15,20],[16,20],
    [1,21],[2,21],[3,21],[4,21],[5,21],[6,21],[7,21],[8,21],[9,21],[10,21],[11,21],[12,21],[13,21],[14,21],[15,21],[16,21],
    [1,22],[2,22],[3,22],[4,22],[5,22],[6,22],[7,22],[8,22],[9,22],[10,22],[11,22],[12,22],[13,22],[14,22],[15,22],[16,22],
    [1,23],[2,23],[3,23],[4,23],[5,23],[6,23],[7,23],[8,23],[9,23],[10,23],[11,23],[12,23],[13,23],[14,23],[15,23],[16,23],
    [1,24],[2,24],[3,24],[4,24],[5,24],[6,24],[7,24],[8,24],[9,24],[10,24],[11,24],[12,24],[13,24],[14,24],[15,24],[16,24],
    [1,25],[2,25],[3,25],[4,25],[5,25],[6,25],[7,25],[8,25],[9,25],[10,25],[11,25],[12,25],[13,25],[14,25],[15,25],[16,25],
    [1,26],[2,26],[3,26],[4,26],[5,26],[6,26],[7,26],[8,26],[9,26],[10,26],[11,26],[12,26],[13,26],[14,26],[15,26],[16,26],
    [1,27],[2,27],[3,27],[4,27],[5,27],[6,27],[7,27],[8,27],[9,27],[10,27],[11,27],[12,27],[13,27],[14,27],[15,27],[16,27],
    [1,28],[2,28],[3,28],[4,28],[5,28],[6,28],[7,28],[8,28],[9,28],[10,28],[11,28],[12,28],[13,28],[14,28],[15,28],[16,28],
    [1,29],[2,29],[3,29],[4,29],[5,29],[6,29],[7,29],[8,29],[9,29],[10,29],[11,29],[12,29],[13,29],[14,29],[15,29],[16,29],
  ];
  body.forEach(([x,y]) => px(x, y, 1, 1, '#e8840a'));

  // Darker orange shading on right
  const shade = [
    [13,15],[14,15],[13,16],[14,16],[14,17],[15,17],[14,18],[15,18],[15,19],[16,19],[15,20],[16,20],
    [15,21],[16,21],[15,22],[16,22],[15,23],[16,23],[15,24],[16,24],[15,25],[16,25],[15,26],[16,26],
    [15,27],[16,27],[15,28],[16,28],[15,29],[16,29],
  ];
  shade.forEach(([x,y]) => px(x, y, 1, 1, '#b85e00'));

  // Light highlight top-left
  [[5,15],[6,15],[5,16],[6,16],[4,17],[5,17],[3,18],[4,18]].forEach(([x,y]) => px(x, y, 1, 1, '#ffb74d'));

  // Holes
  [[6,20],[5,22],[9,19],[12,23],[8,25],[11,21],[7,27]].forEach(([x,y]) => px(x, y, 1, 1, '#c87000'));
  [[6,20],[5,22],[9,19],[12,23],[8,25],[11,21],[7,27]].forEach(([x,y]) => px(x, y+0.4, 1, 0.6, '#a05000'));

  // Face
  drawFace(8, 21, '#8b3a00');
}

function drawSwiss() {
  // Pale yellow rounded rectangle
  for (let y = 13; y <= 29; y++) {
    for (let x = 2; x <= 15; x++) {
      px(x, y, 1, 1, '#f5e87a');
    }
  }
  // round corners
  [[2,13],[3,13],[2,14],[15,13],[14,13],[15,14],[2,28],[3,29],[2,29],[15,28],[14,29],[15,29]].forEach(([x,y])=>px(x,y,1,1,'#0a0a0a'));

  // Shading bottom
  for (let x = 2; x <= 15; x++) {
    px(x, 28, 1, 1, '#d4c655');
    px(x, 29, 1, 1, '#c4b645');
  }
  // Highlight top
  for (let x = 4; x <= 13; x++) px(x, 14, 1, 1, '#fffff0');

  // Big holes
  [[5,17],[10,16],[7,21],[12,20],[5,24],[11,24]].forEach(([x,y]) => {
    px(x, y, 2, 2, '#b8b030');
    px(x, y+1, 2, 1, '#9a9420');
  });

  // Face
  drawFace(8, 21, '#7a6f00');
}

function drawGouda() {
  // Round orange-red wheel
  const rows = [
    {y:12, x0:6, x1:11},
    {y:13, x0:4, x1:13},
    {y:14, x0:3, x1:14},
    {y:15, x0:2, x1:15},
    {y:16, x0:2, x1:15},
    {y:17, x0:2, x1:15},
    {y:18, x0:2, x1:15},
    {y:19, x0:2, x1:15},
    {y:20, x0:2, x1:15},
    {y:21, x0:2, x1:15},
    {y:22, x0:2, x1:15},
    {y:23, x0:2, x1:15},
    {y:24, x0:2, x1:15},
    {y:25, x0:2, x1:15},
    {y:26, x0:2, x1:15},
    {y:27, x0:3, x1:14},
    {y:28, x0:4, x1:13},
    {y:29, x0:6, x1:11},
  ];
  rows.forEach(({y, x0, x1}) => {
    for (let x = x0; x <= x1; x++) px(x, y, 1, 1, '#cc5522');
  });

  // Rind ring (darker)
  rows.forEach(({y, x0, x1}) => {
    px(x0, y, 1, 1, '#8b2800');
    px(x1, y, 1, 1, '#8b2800');
  });
  for (let x = 6; x <= 11; x++) { px(x, 12, 1, 1, '#8b2800'); px(x, 29, 1, 1, '#8b2800'); }

  // Wax seal highlight
  px(5, 14, 3, 2, '#ff7744');
  px(5, 14, 1, 1, '#ffaa88');

  // Face
  drawFace(8, 21, '#6b1800');
}

function drawBrie() {
  // Soft white wheel with rind
  const rows = [
    {y:12, x0:6, x1:11},
    {y:13, x0:4, x1:13},
    {y:14, x0:3, x1:14},
    {y:15, x0:2, x1:15},
    {y:16, x0:2, x1:15},
    {y:17, x0:2, x1:15},
    {y:18, x0:2, x1:15},
    {y:19, x0:2, x1:15},
    {y:20, x0:2, x1:15},
    {y:21, x0:2, x1:15},
    {y:22, x0:2, x1:15},
    {y:23, x0:2, x1:15},
    {y:24, x0:2, x1:15},
    {y:25, x0:2, x1:15},
    {y:26, x0:2, x1:15},
    {y:27, x0:3, x1:14},
    {y:28, x0:4, x1:13},
    {y:29, x0:6, x1:11},
  ];
  rows.forEach(({y, x0, x1}) => {
    for (let x = x0; x <= x1; x++) px(x, y, 1, 1, '#f5f0e0');
  });

  // White mold rind
  rows.forEach(({y, x0, x1}) => {
    px(x0, y, 1, 1, '#ccccb8');
    px(x1, y, 1, 1, '#ccccb8');
    if (x1-x0 > 1) { px(x0+1, y, 1, 1, '#e8e4d0'); px(x1-1, y, 1, 1, '#e8e4d0'); }
  });
  for (let x = 6; x <= 11; x++) {
    px(x, 12, 1, 1, '#ccccb8');
    px(x, 29, 1, 1, '#ccccb8');
  }

  // Creamy interior
  for (let y = 17; y <= 26; y++) for (let x = 5; x <= 12; x++) px(x, y, 1, 1, '#fffde8');

  // Subtle mold spots
  [[6,15],[10,14],[13,18],[4,22],[12,25],[7,27],[9,13]].forEach(([x,y]) => px(x, y, 1, 1, '#aabbaa'));

  // Face
  drawFace(8, 21, '#666655');
}

// ── FACE ─────────────────────────────────────────────────────────────────────
function drawFace(cx, cy, outlineColor) {
  // eyes
  px(cx-2, cy-2, 1, 1, outlineColor);
  px(cx+1, cy-2, 1, 1, outlineColor);
  // pupils
  px(cx-2, cy-2, 1, 1, '#111');
  px(cx+1, cy-2, 1, 1, '#111');
  // smile
  px(cx-2, cy+1, 1, 1, outlineColor);
  px(cx-1, cy+2, 1, 1, outlineColor);
  px(cx,   cy+2, 1, 1, outlineColor);
  px(cx+1, cy+1, 1, 1, outlineColor);
  // cheeks
  ctx.fillStyle = 'rgba(255,120,100,0.35)';
  ctx.fillRect((cx-3)*S, (cy)*S, 2*S, 1*S);
  ctx.fillRect((cx+2)*S, (cy)*S, 2*S, 1*S);
}

// ── ATTIRE DRAWERS ───────────────────────────────────────────────────────────
function drawHat(item) {
  if (item === 'none') return;
  if (item === 'tophat') {
    // brim
    for (let x = 3; x <= 14; x++) px(x, 11, 1, 1, '#111111');
    px(3, 12, 1, 1, '#111111'); px(14, 12, 1, 1, '#111111');
    // top
    for (let y = 5; y <= 11; y++) for (let x = 6; x <= 12; x++) px(x, y, 1, 1, '#1a1a1a');
    // band
    for (let x = 6; x <= 12; x++) px(x, 10, 1, 1, '#cc0000');
    // shine
    px(7, 6, 1, 3, '#333');
  }
  if (item === 'cowboy') {
    // brim
    for (let x = 2; x <= 15; x++) px(x, 11, 1, 1, '#8b6914');
    px(2,12,1,1,'#8b6914'); px(15,12,1,1,'#8b6914'); px(3,12,1,1,'#8b6914'); px(14,12,1,1,'#8b6914');
    // crown
    for (let y = 6; y <= 11; y++) for (let x = 5; x <= 12; x++) px(x, y, 1, 1, '#a07820');
    // indent top
    for (let x = 7; x <= 10; x++) px(x, 6, 1, 1, '#7a5800');
    // band
    for (let x = 5; x <= 12; x++) px(x, 10, 1, 1, '#cc8800');
  }
  if (item === 'crown') {
    // base
    for (let x = 4; x <= 13; x++) px(x, 11, 1, 1, '#ffd700');
    for (let x = 4; x <= 13; x++) px(x, 10, 1, 1, '#ffd700');
    // points
    px(4,8,1,2,'#ffd700'); px(4,7,1,1,'#ffd700');
    px(7,8,1,2,'#ffd700'); px(7,6,1,2,'#ffd700');
    px(10,8,1,2,'#ffd700'); px(10,6,1,2,'#ffd700');
    px(13,8,1,2,'#ffd700'); px(13,7,1,1,'#ffd700');
    // gems
    px(8,9,1,1,'#ff0044'); px(5,10,1,1,'#0044ff'); px(11,10,1,1,'#00cc44');
  }
  if (item === 'beret') {
    for (let y = 7; y <= 11; y++) {
      const w = [6,8,10,10,12][y-7];
      const x0 = 8 - Math.floor(w/2);
      for (let x = x0; x < x0+w; x++) px(x, y, 1, 1, '#cc2244');
    }
    px(12, 9, 2, 1, '#aa1133'); // stem
    // highlight
    px(6, 9, 2, 1, '#ee4466');
  }
  if (item === 'hardhat') {
    for (let y = 7; y <= 11; y++) {
      const w = [8,10,12,12,14][y-7];
      const x0 = 8 - Math.floor(w/2);
      for (let x = x0; x < x0+w; x++) px(x, y, 1, 1, '#ffcc00');
    }
    // brim
    for (let x = 2; x <= 15; x++) px(x, 12, 1, 1, '#ffcc00');
    // stripe
    for (let x = 4; x <= 13; x++) px(x, 9, 1, 1, '#cc9900');
    // shine
    px(6, 8, 1, 2, '#ffee88');
  }
}

function drawShades(item) {
  if (item === 'none') return;
  const cy = 19; // eye row on canvas
  if (item === 'aviator') {
    // frames
    for (let x = 4; x <= 7; x++) px(x, cy, 1, 1, '#888800');
    for (let x = 10; x <= 13; x++) px(x, cy, 1, 1, '#888800');
    px(8, cy, 1, 1, '#888800'); px(9, cy, 1, 1, '#888800'); // bridge
    px(3, cy, 1, 1, '#888800'); px(14, cy, 1, 1, '#888800'); // arms
    // lenses
    for (let x = 4; x <= 7; x++) px(x, cy, 1, 1, 'rgba(180,160,0,0.6)');
    for (let x = 10; x <= 13; x++) px(x, cy, 1, 1, 'rgba(180,160,0,0.6)');
    // bottom
    for (let x = 4; x <= 7; x++) px(x, cy+1, 1, 1, '#888800');
    for (let x = 10; x <= 13; x++) px(x, cy+1, 1, 1, '#888800');
  }
  if (item === 'heart') {
    // left heart
    px(4,cy,1,1,'#ff66aa'); px(6,cy,1,1,'#ff66aa');
    px(4,cy+1,1,1,'#ff66aa'); px(5,cy+1,1,1,'#ff66aa'); px(6,cy+1,1,1,'#ff66aa');
    px(5,cy+2,1,1,'#ff66aa');
    // right heart
    px(10,cy,1,1,'#ff66aa'); px(12,cy,1,1,'#ff66aa');
    px(10,cy+1,1,1,'#ff66aa'); px(11,cy+1,1,1,'#ff66aa'); px(12,cy+1,1,1,'#ff66aa');
    px(11,cy+2,1,1,'#ff66aa');
    // bridge
    px(7,cy,1,1,'#cc4488'); px(8,cy,1,1,'#cc4488'); px(9,cy,1,1,'#cc4488');
  }
  if (item === 'monocle') {
    for (let x = 9; x <= 12; x++) { px(x, cy-1, 1, 1, '#ccaa00'); px(x, cy+2, 1, 1, '#ccaa00'); }
    px(8, cy, 1, 1, '#ccaa00'); px(8, cy+1, 1, 1, '#ccaa00');
    px(13, cy, 1, 1, '#ccaa00'); px(13, cy+1, 1, 1, '#ccaa00');
    // lens tint
    for (let x = 9; x <= 12; x++) for (let y = cy; y <= cy+1; y++) px(x, y, 1, 1, 'rgba(200,180,0,0.4)');
    // string
    px(13, cy+2, 1, 1, '#ccaa00'); px(14, cy+3, 1, 1, '#ccaa00'); px(15, cy+4, 1, 1, '#ccaa00');
  }
  if (item === 'vr') {
    for (let x = 3; x <= 14; x++) for (let y = cy-1; y <= cy+2; y++) px(x, y, 1, 1, '#222244');
    for (let x = 4; x <= 7; x++) for (let y = cy; y <= cy+1; y++) px(x, y, 1, 1, '#4444cc');
    for (let x = 9; x <= 13; x++) for (let y = cy; y <= cy+1; y++) px(x, y, 1, 1, '#4444cc');
    px(8, cy, 1, 2, '#222244'); // nose bridge
    px(3, cy, 1, 2, '#444466'); px(14, cy, 1, 2, '#444466'); // straps
    // indicator light
    px(12, cy-1, 1, 1, '#00ff88');
  }
}

function drawChain(item) {
  if (item === 'none') return;
  if (item === 'gold') {
    const links = [[5,32],[6,32],[7,31],[8,31],[9,31],[10,32],[11,32],[8,33],[8,34]];
    links.forEach(([x,y]) => px(x, y, 1, 1, '#ffd700'));
    px(8,35,2,1,'#ffd700'); // pendant
    px(7,36,3,1,'#ffd700');
    px(8,35,1,1,'#ffee88'); // shine
  }
  if (item === 'diamond') {
    const links = [[5,32],[6,32],[7,31],[8,31],[9,31],[10,32],[11,32]];
    links.forEach(([x,y]) => px(x, y, 1, 1, '#ccccff'));
    // diamond pendant
    px(8,33,2,1,'#aaaaff'); px(7,34,3,1,'#8888ff'); px(8,35,2,1,'#aaaaff');
    px(8,33,1,1,'#ffffff'); // sparkle
  }
  if (item === 'pearl') {
    for (let x = 4; x <= 13; x++) px(x, 32, 1, 1, x%2===0 ? '#f5f0e8' : '#e0dbd0');
    px(8, 32, 1, 1, '#ffffff'); // big pearl
  }
}

function drawShoes(item) {
  if (item === 'none') return;
  if (item === 'sneakers') {
    // left
    px(2, 42, 3, 1, '#ff4400'); px(2, 43, 3, 2, '#ff4400'); px(2, 43, 1, 2, '#cc2200');
    px(2, 44, 4, 1, '#222'); // sole
    // right
    px(12, 42, 3, 1, '#ff4400'); px(12, 43, 3, 2, '#ff4400'); px(14, 43, 1, 2, '#cc2200');
    px(12, 44, 4, 1, '#222');
    // laces
    px(3, 42, 1, 1, '#fff'); px(4, 42, 1, 1, '#fff');
    px(13, 42, 1, 1, '#fff'); px(14, 42, 1, 1, '#fff');
  }
  if (item === 'boots') {
    px(2, 40, 2, 5, '#5c3317'); px(2, 44, 4, 1, '#3d1f00');
    px(12, 40, 2, 5, '#5c3317'); px(11, 44, 4, 1, '#3d1f00');
    // buckle
    px(3, 41, 1, 1, '#ffd700'); px(13, 41, 1, 1, '#ffd700');
  }
  if (item === 'heels') {
    px(2, 42, 3, 2, '#ff69b4'); px(5, 43, 1, 1, '#ff69b4'); // heel
    px(2, 44, 3, 1, '#cc1177'); // sole
    px(12, 42, 3, 2, '#ff69b4'); px(12, 43, 1, 1, '#ff69b4');
    px(12, 44, 3, 1, '#cc1177');
  }
  if (item === 'crocs') {
    px(1, 42, 5, 3, '#44bb44'); px(1, 44, 6, 1, '#226622');
    px(12, 42, 5, 3, '#44bb44'); px(11, 44, 6, 1, '#226622');
    // holes
    [[2,42],[4,42],[2,43],[4,43]].forEach(([x,y]) => px(x, y, 1, 1, '#33aa33'));
    [[13,42],[15,42],[13,43],[15,43]].forEach(([x,y]) => px(x, y, 1, 1, '#33aa33'));
  }
}

function drawJacket(item) {
  if (item === 'none') return;
  if (item === 'leather') {
    // body
    for (let y = 30; y <= 40; y++) {
      const w = Math.min(12, 8 + (y-30));
      const x0 = 8 - Math.floor(w/2) + 1;
      for (let x = x0; x < x0+w; x++) px(x, y, 1, 1, '#2a1a0a');
    }
    // lapels
    px(6,30,2,5,'#1a0a00'); px(10,30,2,5,'#1a0a00');
    // zipper
    for (let y = 30; y <= 40; y++) px(8, y, 1, 1, '#888888');
    // collar
    px(6,29,2,2,'#1a0a00'); px(10,29,2,2,'#1a0a00');
    // sheen
    px(5,32,1,4,'#4a3020');
  }
  if (item === 'tuxedo') {
    for (let y = 30; y <= 40; y++) {
      const x0 = 4; const x1 = 13;
      for (let x = x0; x <= x1; x++) px(x, y, 1, 1, '#111122');
    }
    // white shirt
    px(7,30,4,8,'#f0f0f0');
    // bow tie
    px(6,30,2,1,'#cc0022'); px(10,30,2,1,'#cc0022'); px(8,30,1,1,'#aa0011');
    // buttons
    [31,33,35,37].forEach(y => px(8, y, 1, 1, '#cccccc'));
    // lapels
    px(6,30,2,6,'#1a1a33'); px(10,30,2,6,'#1a1a33');
    // pocket square
    px(12,32,1,2,'#ffffff'); px(12,32,1,1,'#eeeeee');
  }
  if (item === 'tracksuit') {
    for (let y = 30; y <= 40; y++) {
      for (let x = 4; x <= 13; x++) px(x, y, 1, 1, '#0044cc');
    }
    // stripes
    for (let y = 30; y <= 40; y++) { px(4, y, 1, 1, '#ffffff'); px(13, y, 1, 1, '#ffffff'); }
    // zipper
    for (let y = 30; y <= 37; y++) px(8, y, 1, 1, '#88aaff');
    // collar
    px(6,29,6,2,'#0033aa');
    // brand logo placeholder
    px(11,33,2,2,'#ffffff');
  }
  if (item === 'cape') {
    // main cape
    for (let y = 29; y <= 42; y++) {
      const spread = (y - 29) * 0.7;
      const x0 = Math.max(1, 8 - Math.floor(spread));
      const x1 = Math.min(16, 9 + Math.floor(spread));
      for (let x = x0; x <= x1; x++) px(x, y, 1, 1, '#880000');
    }
    // inner lining
    for (let y = 29; y <= 42; y++) {
      const spread = (y - 29) * 0.5;
      const x0 = Math.max(3, 8 - Math.floor(spread) + 1);
      const x1 = Math.min(14, 8 + Math.floor(spread));
      for (let x = x0; x <= x1; x++) px(x, y, 1, 1, '#ffdd00');
    }
    // clasp
    px(7,29,3,2,'#ffd700');
    px(8,29,1,1,'#ffffff');
  }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!state.cheese) return;

  // Draw jacket behind cheese
  drawJacket(state.jacket);

  // Draw cheese body
  ({ cheddar: drawCheddar, swiss: drawSwiss, gouda: drawGouda, brie: drawBrie })[state.cheese]();

  // Draw accessories on top
  drawChain(state.chain);
  drawShades(state.shades);
  drawHat(state.hat);
  drawShoes(state.shoes);
}

// ── CONTROLS ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.cheese-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cheese-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.cheese = btn.dataset.cheese;
    document.getElementById('wardrobePrompt').style.display = 'none';
    document.getElementById('wardrobeContent').style.display = 'block';
    render();
  });
});

document.querySelectorAll('.attire-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const slot = btn.dataset.slot;
    const item = btn.dataset.item;
    // deselect others in same slot
    document.querySelectorAll(`.attire-btn[data-slot="${slot}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state[slot] = item;
    render();
  });
});
</script>
</body>
</html>
